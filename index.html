<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nuzlocke Legacy Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Raleway:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--surface3:#26262e;
  --border:#2e2e3a;--border2:#3e3e4e;--text:#e8e8f0;--muted:#6e6e8a;
  --gold:#f0c040;--gold2:#c89820;--red:#e03040;--red2:#a01828;
  --green:#30c060;--green2:#1a7038;--blue:#4080f0;--blue2:#1a40a0;
  --alive:#30c060;--dead:#e03040;--boxed:#4080f0;--champion:#f0c040;
  --banned-bg:#2a0a0a;--banned-border:#5a1010;--banned-text:#e07080;
  --caught-bg:#0a1a10;--caught-border:#1a4020;--caught-text:#50c070;
  --r:10px;--rl:16px;
}
body.light{
  --bg:#f0f0f4;--surface:#ffffff;--surface2:#e8e8f0;--surface3:#d8d8e4;
  --border:#c8c8d8;--border2:#a8a8c0;--text:#1a1a2e;--muted:#606080;
  --gold:#a07000;--gold2:#c89820;--red:#c02030;--red2:#e04060;
  --green:#1a8040;--green2:#30c060;--blue:#2060d0;--blue2:#4080f0;
  --alive:#1a8040;--dead:#c02030;--boxed:#2060d0;--champion:#a07000;
  --banned-bg:#fde8e8;--banned-border:#f0a0a0;--banned-text:#c02030;
  --caught-bg:#e8fde8;--caught-border:#a0d0a0;--caught-text:#1a8040;
  --ev-gym-bg:#fffae8;--ev-gym-border:#c89820;--ev-gym-text:#a07000;
  --ev-rival-bg:#eef0ff;--ev-rival-border:#6080d0;--ev-rival-text:#3050c0;
  --ev-elite-bg:#f5eeff;--ev-elite-border:#9060c0;--ev-elite-text:#7040a0;
  --ev-evil-bg:#fff0f0;--ev-evil-border:#d06070;--ev-evil-text:#c02030;
}
body.light .ec.dead{background:#fde8e8;border-color:#f0a0a0;}
body.light .ec.champion{background:#fffae0;border-color:#e0c060;}
:root{
  --ev-gym-bg:#1a1200;--ev-gym-border:#c89820;--ev-gym-text:#f0c040;
  --ev-rival-bg:#0a0a1a;--ev-rival-border:#3040a0;--ev-rival-text:#6080f0;
  --ev-elite-bg:#1a0a1a;--ev-elite-border:#8030a0;--ev-elite-text:#c060e0;
  --ev-evil-bg:#1a0808;--ev-evil-border:#a01020;--ev-evil-text:#e04060;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Raleway',sans-serif;min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:300;gap:12px;}
.hdr-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-ball{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--red) 50%,var(--surface3) 50%);border:2px solid var(--border2);position:relative;flex-shrink:0;}
.logo-ball::after{content:'';position:absolute;width:7px;height:7px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);top:50%;left:50%;transform:translate(-50%,-50%);}
.logo-ball::before{content:'';position:absolute;height:2px;background:var(--border2);width:100%;top:50%;transform:translateY(-50%);}
.logo-txt{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--text);line-height:1.7;}
.logo-txt span{display:block;font-size:6px;color:var(--muted);}
.hdr-nav{display:flex;gap:6px;align-items:center;}
.nav-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:6px 13px;color:var(--muted);font-family:'Raleway',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.nav-btn:hover{border-color:var(--border2);color:var(--text);}
.nav-btn.active{background:var(--surface3);border-color:var(--gold);color:var(--gold);}
.nav-btn.save-btn{border-color:#4080f050;color:var(--blue);}
.nav-btn.save-btn:hover{background:#4080f015;border-color:var(--blue);}
.nav-btn.gh-btn{border-color:#6e40c950;color:#a78bfa;}
.nav-btn.gh-btn:hover{background:#6e40c915;border-color:#a78bfa;}
.nav-btn.gh-btn.connected{border-color:#30c06050;color:var(--green);}
.gh-status{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px;}
.gh-status.ok{background:#30c06020;color:var(--green);}
.gh-status.err{background:#e0304020;color:var(--red);}
.gh-status.syncing{background:#f0c04020;color:var(--gold);}

.main{flex:1;max-width:1440px;margin:0 auto;width:100%;padding:24px 20px;}

/* ── MOBILE RESPONSIVE ─────────────────────────────── */
@media(max-width:768px){
  /* Header — stack logo above nav, shrink padding */
  .hdr{height:auto;padding:10px 14px;flex-wrap:wrap;gap:8px;}
  .hdr-logo{flex:1;}
  .logo-txt{font-size:7px;}
  .logo-txt span{font-size:5px;}
  .hdr-nav{width:100%;display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-start;}
  .nav-btn{font-size:11px;padding:5px 10px;}

  /* Main content — reduce padding */
  .main{padding:12px 10px;}

  /* Dashboard hero — stack vertically */
  .dash-hero{flex-direction:column;gap:14px;padding:16px;}

  /* Timeline items — reduce padding, allow text to wrap */
  .tl-item{padding:10px 12px;gap:10px;}
  .tl-name{font-size:13px;}
  .tl-gen{font-size:10px;}
  .tl-num{font-size:11px;min-width:32px;}
  .tl-badges{flex-direction:column;gap:4px;align-items:flex-end;}

  /* Run header */
  .run-hdr{gap:10px;margin-bottom:10px;}
  .run-title h2{font-size:16px;}

  /* Run columns — already has 900px breakpoint, this reinforces for mobile */
  .run-cols{grid-template-columns:1fr !important;gap:12px;}

  /* Right panel — not sticky on mobile, full width */
  .right-panel{position:static !important;top:auto;}

  /* Party grid — single column on small screens */
  .party-grid{grid-template-columns:1fr;}

  /* Encounter cards — adjust for narrow screens */
  .ec-nick{font-size:12px;}
  .ec-spr{width:38px;height:38px;}

  /* Battle cards grid — single column */
  .poke-battle-grid{grid-template-columns:1fr !important;padding:10px 12px;}
  .pbc-header{min-height:70px;}
  .pbc-name{font-size:16px;}

  /* Level cap badge row — smaller buttons, wrap better */
  .lc-badge-btn{width:28px;height:28px;font-size:6px;}
  .lc-badge-row{gap:5px;}

  /* Ban grid — 2 per row on phone */
  .ban-grid{grid-template-columns:repeat(2,1fr) !important;}

  /* Registry grid — 3 per row on phone */
  .reg-grid{grid-template-columns:repeat(3,1fr) !important;padding:0 10px 16px;}
  .reg-card{padding:7px 5px;}
  .reg-card-spr{width:44px;height:44px;}
  .reg-card-name{font-size:9px;}

  /* Routes column — reduce padding */
  .rg{border-radius:7px;}
  .routes-hdr{gap:8px;}
  .rsearch{font-size:13px;}

  /* Event rows */
  .event-expand-btn{font-size:10px;padding:3px 7px;}

  /* Starter buttons — wrap on small screens */
  .starter-opts{gap:8px;}
  .starter-btn{min-width:60px;font-size:10px;}

  /* Modal — full width on mobile */
  .modal{padding:18px 16px;max-height:85vh;}

  /* Section headers */
  .sec{font-size:8px;letter-spacing:.5px;}

  /* Panel boxes */
  .panel-box{padding:14px;}
  .panel-box h3{font-size:7px;}

  /* Party toggle */
  .party-toggle{padding:10px 14px;}
  .pt-stats{gap:8px;flex-wrap:wrap;}

  /* Move tooltip — keep within screen */
  .move-tooltip{width:180px;}

  /* LC widget */
  .lc-widget{padding:14px;}
  .lc-widget h3{font-size:7px;}

  /* Touch targets — minimum 44px for comfortable tapping */
  button, .nav-btn, .fsub, .lc-badge-btn, .reg-card,
  .sb-ec, .starter-btn, .event-expand-btn, .open-btn{
    min-height:36px;
  }
  .lc-badge-btn{min-height:28px;min-width:28px;}

  /* Prevent double-tap zoom on buttons */
  button{touch-action:manipulation;}
}
.view{display:none;}.view.active{display:block;}

/* SECTION TITLE */
.sec{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* DASHBOARD */
.dash-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:20px;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}
.curr-badge{background:var(--surface2);border:2px solid var(--gold);border-radius:var(--rl);padding:18px 22px;min-width:240px;flex-shrink:0;}
.cg-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);letter-spacing:2px;margin-bottom:8px;}
.cg-name{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--text);margin-bottom:5px;line-height:1.6;}
.cg-gen{font-size:12px;color:var(--muted);margin-bottom:14px;}
.cg-stats{display:flex;gap:14px;flex-wrap:wrap;}
.cg-stat{text-align:center;}
.cg-sv{font-family:'Press Start 2P',monospace;font-size:15px;display:block;}
.cg-sl{font-size:10px;color:var(--muted);margin-top:3px;}
.hero-meta{flex:1;min-width:180px;}
.hero-meta h2{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--text);margin-bottom:14px;letter-spacing:1px;}
.ban-preview{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.ban-chip{background:var(--surface3);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--muted);text-transform:capitalize;display:flex;align-items:center;gap:4px;}
.ban-chip img{width:18px;height:18px;image-rendering:pixelated;}
.ban-chip.dead{border-color:#e0304050;color:#e07080;}
.ban-chip.champion{border-color:#f0c04050;color:#c89820;}
.no-bans{color:var(--muted);font-size:13px;font-style:italic;}
.open-btn{background:var(--red);border:none;border-radius:var(--r);padding:10px 20px;color:white;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;transition:all .15s;letter-spacing:1px;margin-top:14px;display:block;}
.open-btn:hover{background:#f04050;}

/* TIMELINE */
.tl{display:flex;flex-direction:column;gap:8px;}
.tl-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;}
.tl-item:hover{border-color:var(--border2);background:var(--surface2);}
.tl-item.curr{border-color:var(--gold);background:var(--surface2);}
.tl-item.upcoming{opacity:.4;cursor:default;}
.tl-num{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);width:28px;flex-shrink:0;}
.tl-info{flex:1;}
.tl-name{font-weight:800;font-size:14px;margin-bottom:1px;}
.tl-gen{font-size:11px;color:var(--muted);}
.tl-badges{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.sb{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.sb-curr{background:#f0c04020;color:var(--gold);border:1px solid var(--gold);}
.sb-done{background:#30c06020;color:var(--green);border:1px solid var(--green2);}
.sb-up{background:var(--surface3);color:var(--muted);border:1px solid var(--border);}

/* RUN VIEW — TWO COLUMN */
.run-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.back-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:7px 13px;color:var(--muted);font-family:'Raleway',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0;margin-top:3px;}
.back-btn:hover{color:var(--text);border-color:var(--border2);}
.run-title{flex:1;}
.run-title h2{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--text);margin-bottom:5px;}
.run-title p{font-size:12px;color:var(--muted);}
.run-stats{display:flex;gap:10px;flex-wrap:wrap;}
.rs{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;text-align:center;}
.rs-v{font-family:'Press Start 2P',monospace;font-size:13px;display:block;margin-bottom:3px;}
.rs-l{font-size:10px;color:var(--muted);}
.ro-notice{background:#f0c04015;border:1px solid var(--gold2);border-radius:7px;padding:9px 14px;font-size:12px;color:var(--gold);margin-bottom:14px;}

/* TWO COLUMN: routes left, panel right */
.run-cols{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;}
@media(max-width:900px){.run-cols{grid-template-columns:1fr;}}
/* Party & Box sits full-width below the main columns */
.party-section{margin-bottom:18px;}
.party-toggle{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:11px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;text-align:left;}
.party-toggle:hover{border-color:var(--gold2);}
.party-toggle.open{border-radius:var(--rl) var(--rl) 0 0;border-color:var(--border2);}
.party-toggle-label{font-family:"Press Start 2P",monospace;font-size:7px;color:var(--gold);letter-spacing:1px;white-space:nowrap;}
.pt-stats{display:flex;gap:14px;flex:1;margin-left:12px;flex-wrap:wrap;}
.pt-stat{font-size:11px;font-weight:700;font-family:"Raleway",sans-serif;}
.pt-chev{margin-left:auto;color:var(--muted);font-size:10px;transition:transform .2s;flex-shrink:0;}
.party-toggle.open .pt-chev{transform:rotate(90deg);}
.party-body{background:var(--surface);border:1px solid var(--border2);border-top:none;border-radius:0 0 var(--rl) var(--rl);padding:16px;display:none;}
.party-body.open{display:block;}
.party-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;}

/* RIGHT PANEL */
.right-panel{display:flex;flex-direction:column;gap:14px;position:sticky;top:70px;}
.panel-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;}
.panel-box h3{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);margin-bottom:14px;letter-spacing:1px;}
.panel-box h3.muted{color:var(--muted);}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.fg label{font-size:11px;font-weight:700;color:var(--muted);}
.fi,.fsel{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;color:var(--text);font-family:'Raleway',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .15s;width:100%;}
.fi:focus,.fsel:focus{border-color:var(--gold);}
.fi::placeholder{color:var(--muted);}
.fsel option{background:var(--surface2);}
.fsub{background:var(--green2);border:1px solid var(--green);border-radius:7px;padding:9px;color:white;font-family:'Raleway',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;width:100%;}
.fsub:hover{background:var(--green);}
.ban-warn{background:#e0304015;border:1px solid var(--red2);border-radius:7px;padding:9px 12px;font-size:11px;color:#e07080;margin-top:8px;display:none;}
.ban-warn.show{display:block;}
.enc-list{display:flex;flex-direction:column;gap:8px;}

/* ENC CARD */
.ec{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px;position:relative;overflow:hidden;}
.ec::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.ec.alive::before{background:var(--alive);}
.ec.dead::before{background:var(--dead);}
.ec.boxed::before{background:var(--boxed);}
.ec.champion::before{background:var(--champion);}
.ec.dead{background:#1a0a0a;border-color:#3a1010;}
.ec.champion{background:#1a1600;border-color:#3a3000;}
.ec-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.ec-spr{width:44px;height:44px;flex-shrink:0;image-rendering:pixelated;border-radius:6px;background:var(--surface3);}
.ec.dead .ec-spr{filter:grayscale(1) brightness(.5);}
body.light .ec.dead .ec-spr{filter:grayscale(1) brightness(.85);}
.ec-meta{flex:1;min-width:0;}
.ec-nick{font-weight:900;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.ec-sp{font-size:10px;color:var(--muted);text-transform:capitalize;}
.ec-rt{font-size:10px;color:var(--muted);}
.ec-del{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 5px;border-radius:3px;transition:all .15s;align-self:flex-start;flex-shrink:0;}
.ec-del:hover{color:var(--red);background:#e0304020;}
.ec-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.sb-ec{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid;cursor:pointer;transition:all .15s;background:transparent;font-family:'Raleway',sans-serif;}
.sb-ec.alive{color:var(--alive);border-color:var(--green2);}
.sb-ec.alive.active,.sb-ec.alive:hover{background:var(--green2);color:white;}
.sb-ec.dead{color:#e07080;border-color:var(--red2);}
.sb-ec.dead.active,.sb-ec.dead:hover{background:var(--red2);color:white;}
.sb-ec.boxed{color:#7090e0;border-color:var(--blue2);}
.sb-ec.boxed.active,.sb-ec.boxed:hover{background:var(--blue2);color:white;}
.sb-ec.champion{color:var(--gold);border-color:var(--gold2);}
.sb-ec.champion.active,.sb-ec.champion:hover{background:var(--gold2);color:white;}
.evo-row{display:flex;align-items:center;gap:7px;padding-top:5px;border-top:1px solid var(--border);}
.evo-row label{font-size:9px;color:var(--muted);flex-shrink:0;}
.evo-sel{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 7px;color:var(--text);font-family:'Raleway',sans-serif;font-size:11px;font-weight:600;outline:none;flex:1;}
.tpill{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;color:white;opacity:.85;}
.done-btn{background:var(--gold2);border:1px solid var(--gold);border-radius:var(--r);padding:10px 20px;color:var(--bg);font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;transition:all .15s;width:100%;margin-top:6px;}
.done-btn:hover{background:var(--gold);}

/* ROUTES — LEFT COLUMN */
.routes-hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.rsearch{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:7px 12px;color:var(--text);font-family:'Raleway',sans-serif;font-size:12px;font-weight:600;outline:none;width:200px;}
.rsearch:focus{border-color:var(--gold);}
.rsearch::placeholder{color:var(--muted);}
.loading-routes{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;color:var(--muted);font-size:13px;font-style:italic;}
.loading-routes .spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.no-api{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;color:var(--muted);font-size:13px;line-height:1.8;}
.no-api strong{color:var(--text);}

/* ROUTE GROUP */
.rg{margin-bottom:6px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.rg-btn{width:100%;background:var(--surface);border:none;padding:13px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;transition:background .1s;}
.rg-btn:hover,.rg-btn.open{background:var(--surface2);}
.rg-num{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);width:24px;flex-shrink:0;}
.rg-name{font-size:14px;font-weight:800;color:var(--text);flex:1;}
.rg-badges{display:flex;gap:5px;align-items:center;}
.rg-caught{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--caught-bg);color:var(--caught-text);border:1px solid var(--caught-border);}
.rg-floors{font-size:10px;color:var(--muted);}
.rg-chev{color:var(--muted);font-size:12px;transition:transform .2s;flex-shrink:0;margin-left:6px;}
.rg-chev.open{transform:rotate(90deg);}
.rg-body{display:none;border-top:1px solid var(--border);background:var(--bg);}
.rg-body.open{display:block;}

/* FLOOR TABS */
.ftabs{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;}
.ftab{background:none;border:none;border-bottom:2px solid transparent;padding:8px 15px;font-family:'Raleway',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;margin-bottom:-1px;}
.ftab:hover{color:var(--text);}
.ftab.active{color:var(--gold);border-bottom-color:var(--gold);}
.fcontent{padding:12px 18px;}

/* ENCOUNTER ROWS */
.emg{margin-bottom:12px;}
.em-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:7px;text-transform:uppercase;}
.prow{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:7px;margin-bottom:3px;border:1px solid transparent;}
.prow:hover{background:var(--surface2);}
.prow.banned{background:var(--banned-bg);border-color:var(--banned-border);}
.prow.caught{background:var(--caught-bg);border-color:var(--caught-border);}
.pspr{width:36px;height:36px;image-rendering:pixelated;flex-shrink:0;}
.pname{flex:1;font-size:13px;font-weight:700;text-transform:capitalize;}
.prow.banned .pname{color:var(--banned-text);}
.prow.caught .pname{color:var(--caught-text);}
.prate{font-size:11px;color:var(--muted);width:34px;text-align:right;flex-shrink:0;}
.plv{font-size:10px;color:var(--muted);width:58px;text-align:right;flex-shrink:0;}
.ptag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.ptag.b{background:var(--banned-bg);color:var(--banned-text);border:1px solid var(--banned-border);}
.ptag.c{background:var(--caught-bg);color:var(--caught-text);border:1px solid var(--caught-border);}
.plog{background:transparent;border:1px solid var(--border2);border-radius:5px;padding:3px 10px;color:var(--muted);font-family:'Raleway',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.plog:hover{background:var(--green2);border-color:var(--green);color:white;}
.no-enc{padding:12px 18px;font-size:12px;color:var(--muted);font-style:italic;}
.rload{padding:14px 18px;color:var(--muted);font-size:12px;font-style:italic;}

/* STARTER SELECTOR */
.starter-sel{background:var(--surface);border:2px solid var(--gold);border-radius:var(--rl);padding:20px;margin-bottom:16px;}
.starter-sel h3{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);margin-bottom:6px;letter-spacing:1px;}
.starter-sel p{font-size:12px;color:var(--muted);margin-bottom:14px;}
.starter-opts{display:flex;gap:10px;flex-wrap:wrap;}
.starter-btn{flex:1;min-width:80px;background:var(--surface2);border:2px solid var(--border2);border-radius:var(--r);padding:12px 8px;cursor:pointer;text-align:center;transition:all .15s;font-family:'Raleway',sans-serif;}
.starter-btn:hover{border-color:var(--gold);}
.starter-btn.selected{border-color:var(--gold);background:#1a1400;}
.starter-btn img{width:56px;height:56px;image-rendering:pixelated;display:block;margin:0 auto 4px;}
.starter-btn span{font-size:12px;font-weight:800;text-transform:capitalize;color:var(--text);}

/* IMPROVED TYPE CHIP — dark text on light types */
.type-chip{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}

/* DEATH NOTE on enc card */
.ec-death-note{background:#1a0505;border:1px solid #5a1010;border-radius:6px;padding:6px 10px;font-size:11px;color:#e07080;margin-top:5px;}
.ec-death-note strong{font-style:normal;color:#f09090;display:block;font-size:10px;margin-bottom:2px;}

/* LEVEL CAP WIDGET */
.lc-widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px;}
.lc-widget h3{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);margin-bottom:14px;letter-spacing:1px;}
.lc-badge-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.lc-badge-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);cursor:pointer;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lc-badge-btn:hover{border-color:var(--gold);color:var(--gold);}
.lc-badge-btn.earned{background:var(--gold2);border-color:var(--gold);color:var(--bg);}
.lc-cap-display{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;text-align:center;}
.lc-cap-num{font-family:'Press Start 2P',monospace;font-size:28px;color:var(--gold);display:block;margin-bottom:6px;}
.lc-cap-label{font-size:11px;color:var(--muted);margin-bottom:10px;display:block;}
.lc-team-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding-top:10px;border-top:1px solid var(--border);}
.lc-team-poke{text-align:center;}
.lc-team-poke img{width:42px;height:42px;image-rendering:pixelated;display:block;margin:0 auto 2px;}
.lc-team-poke .lc-tp-name{font-size:9px;color:var(--muted);text-transform:capitalize;display:block;}
.lc-team-poke .lc-tp-lv{font-size:8px;color:var(--gold);display:block;font-weight:700;}
.lc-no-cap{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0;}

/* ENHANCED EVENT TEAM — rich Pokémon cards */
.poke-battle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:14px 16px;}
.poke-battle-card{background:var(--surface);border-radius:var(--r);overflow:visible;border:1px solid var(--border);}
.pbc-header{position:relative;padding:12px 14px 10px;overflow:visible;min-height:90px;}
.pbc-header-bg{position:absolute;inset:0;opacity:.18;}
.pbc-header-content{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-end;}
.pbc-header-left{flex:1;}
.pbc-types{display:flex;gap:4px;margin-bottom:5px;}
.pbc-level{font-size:10px;color:rgba(255,255,255,.7);margin-bottom:2px;}
.pbc-name{font-size:18px;font-weight:900;color:white;text-transform:capitalize;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.pbc-sprite{width:72px;height:72px;image-rendering:pixelated;flex-shrink:0;filter:drop-shadow(1px 2px 3px rgba(0,0,0,.4));}
.pbc-body{padding:12px 14px;}
.pbc-moves{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;margin-bottom:12px;min-height:116px;}
.pbc-move{background:var(--surface2);border-radius:6px;padding:6px 8px;}
.pbc-move-hoverable{position:relative;}
.pbc-move-hoverable:hover .move-tooltip{opacity:1;pointer-events:auto;}
.move-tooltip{position:fixed;background:#1a1a2e;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;width:210px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .15s;box-shadow:0 4px 20px rgba(0,0,0,.7);top:0;left:0;}
.move-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1a2e;}
.dmg-icon{width:20px;height:14px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.pbc-move-name{font-size:11px;font-weight:700;color:var(--text);text-transform:capitalize;margin-bottom:3px;}
.pbc-move-sub{display:flex;align-items:center;gap:5px;}
.pbc-move-power{font-size:10px;color:var(--muted);font-weight:700;}
.pbc-stats{display:flex;flex-direction:column;gap:3px;padding-top:10px;border-top:1px solid var(--border);}
.pbc-stat-row{display:flex;align-items:center;gap:6px;}
.pbc-stat-lbl{font-size:9px;color:var(--muted);width:24px;text-align:right;flex-shrink:0;font-weight:700;}
.pbc-stat-bar{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.pbc-stat-fill{height:100%;border-radius:3px;transition:width .4s;}
.pbc-stat-num{font-size:10px;font-weight:700;width:26px;text-align:right;flex-shrink:0;}
body.light .pbc-stat-num{color:var(--text) !important;}
body.light .reg-stat-num{color:var(--text) !important;}
.pbc-total{text-align:right;font-size:10px;color:var(--muted);margin-top:5px;}
.event-row-wrap{margin-bottom:6px;}
.event-expand-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;transition:all .15s;font-family:'Raleway',sans-serif;flex-shrink:0;}
.event-expand-btn:hover{background:var(--surface3);color:var(--text);}
.event-team{display:none;padding:12px 16px;border-top:1px solid var(--border);}
.event-team.open{display:block;}
.event-team-grid{display:flex;flex-wrap:wrap;gap:8px;}
.et-poke{text-align:center;min-width:52px;}
.et-poke img{width:46px;height:46px;image-rendering:pixelated;display:block;margin:0 auto 2px;}
.et-poke .et-name{font-size:9px;color:var(--muted);text-transform:capitalize;display:block;}
.et-poke .et-lv{font-size:9px;color:var(--gold);display:block;font-weight:800;}

/* BAN LIST */
.ban-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;}
.reg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;padding:0 24px 24px;}
.reg-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;text-align:center;cursor:pointer;transition:all .15s;position:relative;}
.reg-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2);}
.reg-card.status-dead{background:var(--banned-bg);border-color:var(--banned-border);}
.reg-card.status-champion{background:#1a1600;border-color:#3a3000;}
body.light .reg-card.status-champion{background:#fffae0;border-color:#e0c060;}
.reg-card.status-never{opacity:.45;}
.reg-card-spr{width:56px;height:56px;image-rendering:pixelated;margin:0 auto 4px;display:block;}
.reg-card-name{font-size:10px;font-weight:800;text-transform:capitalize;color:var(--text);}
.reg-card-sub{font-size:9px;color:var(--muted);margin-top:2px;}
.reg-card-count{position:absolute;top:5px;right:5px;background:var(--surface3);border-radius:10px;font-size:8px;font-weight:800;padding:1px 5px;color:var(--muted);}
.reg-card.status-dead .reg-card-name{color:var(--banned-text);}
.reg-card.status-champion .reg-card-name{color:var(--champion);}
.reg-filter-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:5px 12px;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:Raleway,sans-serif;transition:all .15s;}
.reg-filter-btn:hover{border-color:var(--gold);color:var(--gold);}
.reg-filter-btn.active{background:var(--gold2);border-color:var(--gold);color:white;}
.ban-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center;}
.ban-card.db{border-color:#3a1010;background:#1a0a0a;}
.ban-card.cb{border-color:#3a3000;background:#1a1600;}
.ban-card img{width:60px;height:60px;image-rendering:pixelated;display:block;margin:0 auto 5px;}
.ban-card.db img{filter:grayscale(1) brightness(.5);}
.ban-sp{font-size:12px;font-weight:700;text-transform:capitalize;margin-bottom:3px;}
.ban-rs{font-size:10px;}
.ban-rs.dead{color:#e07080;}.ban-rs.champion{color:var(--gold);}

/* SAVE/LOAD MODAL SPECIFICS */
.save-slot{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.save-slot:last-child{margin-bottom:0;}
.ss-info{flex:1;min-width:0;}
.ss-name{font-weight:800;font-size:13px;margin-bottom:2px;}
.ss-meta{font-size:11px;color:var(--muted);}
.ss-btns{display:flex;gap:6px;flex-shrink:0;}
.ss-btn{border-radius:6px;padding:6px 12px;font-family:'Raleway',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:transparent;color:var(--muted);}
.ss-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface3);}
.ss-btn.load{border-color:var(--blue2);color:var(--blue);}
.ss-btn.load:hover{background:var(--blue2);color:white;}
.ss-btn.del{border-color:var(--red2);color:var(--red);}
.ss-btn.del:hover{background:var(--red2);color:white;}
.ss-btn.active-save{border-color:var(--gold2);color:var(--gold);}
.empty-slot{color:var(--muted);font-size:12px;font-style:italic;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-ov.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:26px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto;}
.modal h3{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--text);margin-bottom:18px;}
.modal-body{margin-bottom:20px;}
.modal-body p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:7px;}
.modal-body strong{color:var(--text);}
.modal-acts{display:flex;gap:9px;justify-content:flex-end;flex-wrap:wrap;}
.mbtn{border-radius:7px;padding:9px 18px;font-family:'Raleway',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;border:none;}
.mbtn.cancel{background:var(--surface3);color:var(--muted);}
.mbtn.cancel:hover{color:var(--text);}
.mbtn.cdead{background:var(--red2);color:white;}
.mbtn.cdead:hover{background:var(--red);}
.mbtn.cchamp{background:var(--gold2);color:var(--bg);}
.mbtn.cchamp:hover{background:var(--gold);}
.mbtn.cblue{background:var(--blue2);color:white;}
.mbtn.cblue:hover{background:var(--blue);}
.mbtn.cred{background:var(--red2);color:white;}
.mbtn.cred:hover{background:var(--red);}

.empty-st{text-align:center;padding:36px 20px;color:var(--muted);}
.empty-st p{font-family:'Press Start 2P',monospace;font-size:8px;line-height:2;}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
<header class="hdr">
  <div class="hdr-logo">
    <div class="logo-ball"></div>
    <div class="logo-txt">NUZLOCKE LEGACY<span>Cross-Game Tracker</span></div>
  </div>
  <nav class="hdr-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showView('dashboard')">Dashboard</button>
    <button class="nav-btn" id="nav-banlist" onclick="showView('banlist')">Ban List <span id="ban-badge"></span></button>
    <button class="nav-btn" id="nav-registry" onclick="showView('registry')">Pokédex Registry</button>
    <button class="nav-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" style="padding:6px 10px;font-size:14px;">☀️</button>
    <button class="nav-btn save-btn" onclick="openSaveModal()">💾 Save / Load</button>
    <button class="nav-btn gh-btn" id="gh-nav-btn" onclick="openGitHubModal()" title="GitHub Cloud Sync">☁️ GitHub <span class="gh-status" id="gh-nav-status"></span></button>
  </nav>
</header>

<div class="main">
  <div class="view active" id="view-dashboard">
    <div class="dash-hero" id="dash-hero"></div>
    <div class="sec">GAME TIMELINE</div>
    <div class="tl" id="tl"></div>
  </div>

  <div class="view" id="view-run">
    <div class="run-hdr">
      <button class="back-btn" onclick="showView('dashboard')">← Back</button>
      <div class="run-title"><h2 id="run-name"></h2><p id="run-sub"></p></div>
      <div class="run-stats" id="run-stats"></div>
    </div>
    <div class="ro-notice" id="ro-notice" style="display:none;">📖 Completed run — read only.</div>
    <div class="party-section" id="party-section"></div>
    <div class="run-cols">
      <div id="routes-col"></div>
      <div class="right-panel" id="right-panel"></div>
    </div>
  </div>

  <div class="view" id="view-banlist">
    <div class="sec">PERMANENTLY BANNED SPECIES</div>
    <div class="ban-grid" id="ban-grid"></div>
  </div>

  <div class="view" id="view-registry">
    <div style="padding:16px 24px 0;">
      <div class="sec" style="margin-bottom:10px;">POKÉDEX REGISTRY</div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">
        <input id="reg-search" class="fi" placeholder="Search Pokémon…" style="max-width:220px;" oninput="renderRegistry()"/>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="reg-filter-btn active" data-filter="all" onclick="setRegFilter(this,'all')">All</button>
          <button class="reg-filter-btn" data-filter="caught" onclick="setRegFilter(this,'caught')">Caught</button>
          <button class="reg-filter-btn" data-filter="alive" onclick="setRegFilter(this,'alive')">Alive</button>
          <button class="reg-filter-btn" data-filter="dead" onclick="setRegFilter(this,'dead')">Fallen</button>
          <button class="reg-filter-btn" data-filter="champion" onclick="setRegFilter(this,'champion')">Champions</button>
          <button class="reg-filter-btn" data-filter="never" onclick="setRegFilter(this,'never')">Never Caught</button>
        </div>
      </div>
      <div id="reg-stats" style="font-size:11px;color:var(--muted);margin-bottom:12px;"></div>
    </div>
    <div class="reg-grid" id="reg-grid"></div>
  </div>
</div>
</div>

<div class="modal-ov" id="modal"><div class="modal">
  <h3 id="mt"></h3>
  <div class="modal-body" id="mb"></div>
  <div class="modal-acts" id="ma"></div>
</div></div>

<script>

// ══════════════════════════════════════════════
// TXT-BASED GAME DATA
// Parsed from domtronn/nuzlocke.data format:
//   Route Name|poke1,poke2,...        → wild encounter
//   --Event Name|id|type|Trainer      → battle event (gym, rival, etc)
// ══════════════════════════════════════════════

const GAME_TXT = {};

// Manual name mappings for species with special chars or irregular API slugs
// Declared here (before parseTxt/registerGameData) so normPokeName can use it at load time
const NAME_MAP={
  'nidoranf':'nidoran-f','nidoranm':'nidoran-m',
  'mrmime':'mr-mime','mimejr':'mime-jr',
  'typenull':'type-null',
  'jangmoo':'jangmo-o','hakamoo':'hakamo-o','kommoo':'kommo-o',
  'tapukoko':'tapu-koko','tapulele':'tapu-lele','tapubulu':'tapu-bulu','tapufini':'tapu-fini',
  'farfetchd':'farfetch-d',
};

// Normalise a pokemon name from txt format to API-compatible format
// Applied at parse time so all stored data is consistent
function normPokeName(p){
  const k=norm(p.trim());
  return NAME_MAP[k]||k;
}

// Parser: converts raw txt string into structured route+event list
function parseTxt(txt){
  const lines = txt.trim().split('\n');
  const entries = [];
  lines.forEach((line,i)=>{
    line = line.trim();
    if(!line) return;
    if(line.startsWith('--')){
      const inner = line.slice(2);
      const parts = inner.split('|');
      const label = parts[0].trim();
      const id = parts[1]||'';
      const type = parts[2]||'';
      const trainer = parts[3]||'';
      entries.push({kind:'event', label, id, type, trainer, _origIdx:i});
    } else {
      const [label, pokemonStr=''] = line.split('|');
      // Normalise all pokemon names through NAME_MAP at parse time
      const pokemon = pokemonStr.split(',').map(normPokeName).filter(Boolean);
      entries.push({kind:'route', label:label.trim(), pokemon, _origIdx:i});
    }
  });
  return entries;
}

// Register game txt data
function registerGameData(gameId, txt){
  GAME_TXT[gameId] = parseTxt(txt);
}

// Get entries for a game (routes + events in order)
function getGameEntries(gameId){
  return GAME_TXT[gameId] || null;
}

// ══════════════════════════════════════════════
// BATTLE DATA (leader teams + level caps)
// Parsed from nuzlocke.data leader format
// ══════════════════════════════════════════════

const BATTLE_DATA = {};

// Parse leader/battle txt into structured data
// Format per battle: --id|name|type|url\npokemon|level|m1,m2,m3,m4|||starter-weakness
// The weakness field means this pokemon only appears if player's starter is weak to [type]
// e.g. |||water means this pokemon appears if player chose fire starter
function parseBattleData(txt){
  const result={};
  const sections=txt.split(/\n(?=--)/);
  sections.forEach(section=>{
    const lines=section.trim().split('\n');
    if(!lines.length||!lines[0].startsWith('--'))return;
    const header=lines[0].slice(2).split('|');
    const id=header[0]?.trim();
    const name=header[1]?.trim()||'';
    const type=header[2]?.trim()||'';
    if(!id)return;
    const team=[];
    lines.slice(1).forEach(line=>{
      if(!line.trim()||line.startsWith('#')||line.startsWith('--'))return;
      const parts=line.split('|');
      const pname=normPokeName(parts[0]||'');
      const level=parseInt(parts[1])||0;
      const moves=(parts[2]||'').split(',').map(m=>m.trim()).filter(Boolean);
      const weakness=parts[5]?.trim()||null; // conditional: only show if player starter is weak to this type
      if(pname&&level) team.push({name:pname,level,moves,weakness});
    });
    result[id]={id,name,type,team};
  });
  return result;
}

function registerBattleData(gameId, txt){
  BATTLE_DATA[gameId]=parseBattleData(txt);
}

function getBattle(gameId, battleId){
  return BATTLE_DATA[gameId]?.[battleId]||null;
}

// Filter a battle's team based on the player's starter choice
// weakness field: 'water' means this mon appears when starter is fire (weak to water)
const STARTER_WEAKNESS={
  bulbasaur:'fire',
  charmander:'water',
  squirtle:'grass',
  chikorita:'fire',
  cyndaquil:'water',
  totodile:'grass',
  treecko:'fire',
  torchic:'water',
  mudkip:'grass',
};

// Yellow: eeveelution Blue uses depends on early battle results, not starter
// labWin: did player beat Blue at Oak's Lab?
// routeWin: did player beat Blue at Route 22? (null = skipped)
// Win+Win → Jolteon (grass weakness tag)
// Win+Skip/Lose OR Lose+Win → Flareon (fire weakness tag)
// Lose+Skip/Lose → Vaporeon (water weakness tag)
function getYellowEeveelution(gameId){
  const gd=state.games[gameId]||{};
  const labWin=gd.yellowLabWin;    // true/false/undefined
  const routeWin=gd.yellowRouteWin; // true/false/null(skipped)/undefined
  if(labWin===undefined) return null; // not set yet
  if(labWin===true && routeWin===true) return 'grass';   // Jolteon
  if(labWin===false && routeWin!==true) return 'water';  // Vaporeon
  return 'fire'; // Flareon — all other combos
}

function setYellowBattle(gameId, key, val){
  if(!state.games[gameId]) state.games[gameId]={status:'active',encounters:[]};
  state.games[gameId][key]=val;
  save();
  renderRunLayout(gameId);
}

function getFilteredTeam(gameId, battle){
  if(!battle) return [];
  // Yellow uses eeveelution logic instead of starter weakness
  const weaknessKey = gameId==='yellow'
    ? getYellowEeveelution(gameId)
    : STARTER_WEAKNESS[getStarter(gameId)||''];
  return battle.team.filter(p=>{
    if(!p.weakness) return true;
    if(!weaknessKey) return false; // not set yet — hide conditionals
    return weaknessKey===p.weakness;
  });
}

function getLevelCap(gameId, badges){
  const order=LEVEL_CAP_ORDER[gameId];
  if(!order||badges===undefined||badges===null) return null;
  const entry=order[badges]; // badges=0 → Brock, badges=8 → E4
  if(!entry) return null;
  const battle=getBattle(gameId, entry[0]);
  if(!battle) return null;
  const maxLv=Math.max(...battle.team.map(p=>p.level));
  return {maxLv, label:entry[1], battle};
}

function norm(s){return String(s).toLowerCase().trim().replace(/[éèê]/g,'e').replace(/[^a-z0-9-]/g,'');}
function isBanned(n){
  const k=norm(n);
  for(const g of EX_GROUPS)if(g.includes(k))return!!state.bans[k];
  return!!state.bans[k];
}

// Returns ban info if this species OR any family member is banned.
// Respects EX_GROUPS: species in the same exception group are treated independently
// (e.g. Vaporeon dying does NOT flag Jolteon as banned).
function isInSameExGroup(a, b){
  for(const g of EX_GROUPS) if(g.includes(a)&&g.includes(b)) return true;
  return false;
}
function getFamilyBan(speciesName){
  const k=norm(speciesName);
  if(_familyBanCache[k]!==undefined) return _familyBanCache[k];
  if(state.bans[k]){ _familyBanCache[k]=state.bans[k]; return state.bans[k]; }
  // Walk evo chains across all games to find if any family member is banned
  for(const [gid,gdata] of Object.entries(state.games||{})){
    for(const enc of (gdata.encounters||[])){
      const evos=(enc.evolutions||[]).map(ev=>norm(ev));
      if(evos.includes(k)){
        // Found a chain containing this species
        for(const ev of evos){
          // Skip if in same exception group (treat as separate species)
          if(isInSameExGroup(k,ev)) continue;
          if(state.bans[ev]) return state.bans[ev];
        }
      }
    }
  }
  return null;
}
let _familyBanCache={};  // cleared on every save() call
function doBan(sp,reason,gname,nick){state.bans[norm(sp)]={reason,game:gname,nickname:nick||sp};_familyBanCache={};save();}

async function getPokemon(q){
  const orig=norm(String(q));
  const k=NAME_MAP[orig]||orig;
  // Check pre-seeded or previously fetched — use != null to catch both
  if(pkCache[orig]!=null) return pkCache[orig];
  if(pkCache[k]!=null) return pkCache[k];
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${k}`);
    if(!r.ok){
      // Only mark as null if not already pre-seeded
      if(pkCache[orig]===undefined) pkCache[orig]=null;
      if(pkCache[k]===undefined) pkCache[k]=null;
      return pkCache[orig]||pkCache[k]||null;
    }
    const d=await r.json();
    const sprite=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${d.id}.png`;
    const data={id:d.id,name:d.name,sprite,types:d.types.map(t=>t.type.name)};
    pkCache[d.name]=data;pkCache[norm(d.name)]=data;
    pkCache[String(d.id)]=data;pkCache[k]=data;pkCache[orig]=data;
    return data;
  }catch(e){
    if(pkCache[orig]===undefined) pkCache[orig]=null;
    if(pkCache[k]===undefined) pkCache[k]=null;
    return pkCache[orig]||pkCache[k]||null;
  }
}

async function fetchMoveData(moveName){
  const k=norm(moveName);
  if(moveCache[k]!==undefined) return moveCache[k];
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/move/${k}/`);
    if(!r.ok){moveCache[k]=null;return null;}
    const d=await r.json();
    const effect=(d.effect_entries||[]).find(e=>e.language.name==='en');
    const shortEffect=effect
      ? effect.short_effect.replace(/\$effect_chance/g, d.effect_chance||'?')
      : '';
    const m={
      name:d.name,
      power:d.power,
      pp:d.pp,
      accuracy:d.accuracy,
      type:d.type.name,
      damage_class:d.damage_class.name,
      effect:shortEffect,
    };
    moveCache[k]=m; return m;
  }catch(e){moveCache[k]=null;return null;}
}

async function fetchPokemonDetail(pokemonName){
  const orig=norm(pokemonName);
  const k=NAME_MAP[orig]||orig;
  if(detailCache[orig]!==undefined) return detailCache[orig];
  if(detailCache[k]!==undefined) return detailCache[k];
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${k}/`);
    if(!r.ok){detailCache[k]=null;detailCache[orig]=null;return null;}
    const d=await r.json();
    const smap={hp:0,attack:0,defense:0,'special-attack':0,'special-defense':0,speed:0};
    d.stats.forEach(s=>{smap[s.stat.name]=s.base_stat;});
    const stats={hp:smap.hp,atk:smap.attack,def:smap.defense,spa:smap['special-attack'],spd:smap['special-defense'],spe:smap.speed};
    const total=Object.values(stats).reduce((a,b)=>a+b,0);
    // Update pkCache while we're here
    if(!pkCache[k]||!pkCache[orig]){
      const data={id:d.id,name:d.name,sprite:d.sprites.front_default,types:d.types.map(t=>t.type.name)};
      pkCache[d.name]=data;pkCache[norm(d.name)]=data;pkCache[String(d.id)]=data;pkCache[k]=data;pkCache[orig]=data;
    }
    const result={stats,total};
    // Cache under every variant so any lookup hits
    detailCache[k]=result;detailCache[orig]=result;detailCache[norm(d.name)]=result;detailCache[String(d.id)]=result;
    return result;
  }catch(e){detailCache[k]=null;detailCache[orig]=null;return null;}
}

async function getEvos(sp){
  try{
    const k=NAME_MAP[norm(sp)]||norm(sp);
    const sr=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${k}`);
    if(!sr.ok)return[];
    const sd=await sr.json();
    const cr=await fetch(sd.evolution_chain.url);
    const cd=await cr.json();
    const names=[];
    function walk(n){names.push(n.species.name);n.evolves_to.forEach(walk);}
    walk(cd.chain);
    return names;
  }catch(e){return[];}
}

async function getAreaEnc(slug,ver){
  const ck=slug+'|'+ver;
  if(encCache[ck]!==undefined)return encCache[ck];
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/location-area/${slug}/`);
    if(!r.ok){encCache[ck]=[];return[];}
    const d=await r.json();
    const byM={};
    (d.pokemon_encounters||[]).forEach(pe=>{
      pe.version_details.forEach(vd=>{
        if(vd.version.name!==ver)return;
        vd.encounter_details.forEach(ed=>{
          const m=ed.method.name;
          if(!byM[m])byM[m]={};
          const pn=pe.pokemon.name;
          if(!byM[m][pn])byM[m][pn]={name:pn,rate:0,minLv:99,maxLv:0};
          byM[m][pn].rate+=ed.chance;
          byM[m][pn].minLv=Math.min(byM[m][pn].minLv,ed.min_level);
          byM[m][pn].maxLv=Math.max(byM[m][pn].maxLv,ed.max_level);
        });
      });
    });
    const res=Object.entries(byM).map(([m,pk])=>({method:m,pokemon:Object.values(pk).sort((a,b)=>b.rate-a.rate)})).filter(g=>g.pokemon.length>0);
    encCache[ck]=res;return res;
  }catch(e){encCache[ck]=[];return[];}
}

// Build where-to-find from our route data
function getRouteLocations(pokeName){
  const k=norm(pokeName);
  const results={}; // gameId -> [routeLabel]
  Object.entries(GAME_TXT).forEach(([gameId, entries])=>{
    entries.forEach(entry=>{
      if(entry.kind!=='route') return;
      if((entry.pokemon||[]).some(p=>norm(p)===k)){
        if(!results[gameId]) results[gameId]=[];
        results[gameId].push(entry.label);
      }
    });
  });
  return results;
}

// Encounter history for a Pokémon across all games
function getEncounterHistory(pokeName){
  const k=norm(pokeName);
  const history=[];
  Object.entries(state.games||{}).forEach(([gameId, gd])=>{
    const gm=GAMES.find(g=>g.id===gameId);
    (gd.encounters||[]).forEach(enc=>{
      if(norm(enc.currentSpecies||enc.species)===k||norm(enc.species)===k){
        history.push({gameId, gameName:gm?.n||gameId, enc});
      }
    });
  });
  return history;
}

let _evoCache={};
async function getEvoChain(sp){
  const k=NAME_MAP[norm(sp)]||norm(sp);
  if(_evoCache[k]) return _evoCache[k];
  try{
    const sr=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${k}`);
    if(!sr.ok) return null;
    const sd=await sr.json();
    const cr=await fetch(sd.evolution_chain.url);
    const cd=await cr.json();

    function walkChain(node, result=[]){
      const name=node.species.name;
      node.evolves_to.forEach(next=>{
        const det=next.evolution_details[0]||{};
        let method='';
        if(det.min_level) method=`Lv. ${det.min_level}`;
        else if(det.item) method=`Use ${det.item.name.replace(/-/g,' ')}`;
        else if(det.held_item) method=`Hold ${det.held_item.name.replace(/-/g,' ')}`;
        else if(det.trigger?.name==='trade') method='Trade';
        else if(det.min_happiness) method=`Friendship (${det.min_happiness}+)`;
        else if(det.min_affection) method=`Affection`;
        else if(det.time_of_day) method=`Lv. up (${det.time_of_day})`;
        else if(det.known_move) method=`Know ${det.known_move.name.replace(/-/g,' ')}`;
        else if(det.location) method=`Level up at ${det.location.name.replace(/-/g,' ')}`;
        else method='Level up';
        result.push({from:name, to:next.species.name, method});
        walkChain(next, result);
      });
      return result;
    }
    const steps=walkChain(cd.chain);
    // Also collect all names in order
    const allNames=[];
    function collectNames(node){allNames.push(node.species.name);node.evolves_to.forEach(collectNames);}
    collectNames(cd.chain);
    const chain={steps, allNames};
    _evoCache[k]=chain;
    return chain;
  }catch(e){return null;}
}

function renderRegistry(){
  const grid=document.getElementById('reg-grid');
  const statsEl=document.getElementById('reg-stats');
  if(!grid) return;

  const search=(document.getElementById('reg-search')?.value||'').toLowerCase().trim();
  const all=getAllRegistryPokemon();

  const nDead=all.filter(p=>p.status==='dead').length;
  const nChamp=all.filter(p=>p.status==='champion').length;
  const nAlive=all.filter(p=>p.status==='alive').length;
  const nNever=all.filter(p=>p.status==='never').length;
  if(statsEl) statsEl.textContent=`${all.length} Pokémon tracked · ${nAlive} alive · ${nChamp} retired · ${nDead} fallen · ${nNever} never caught`;

  let filtered=all;
  if(search) filtered=filtered.filter(p=>p.name.includes(search)||p.name.replace(/-/g,' ').includes(search));
  if(_regFilter==='caught') filtered=filtered.filter(p=>p.status!=='never');
  else if(_regFilter==='alive') filtered=filtered.filter(p=>p.status==='alive');
  else if(_regFilter==='dead') filtered=filtered.filter(p=>p.status==='dead');
  else if(_regFilter==='champion') filtered=filtered.filter(p=>p.status==='champion');
  else if(_regFilter==='never') filtered=filtered.filter(p=>p.status==='never');

  // Sort by Pokédex number
  filtered.sort((a,b)=>getDexNum(a.name)-getDexNum(b.name));

  if(filtered.length===0){grid.innerHTML='<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted);">No Pokémon match your filter.</div>';return;}

  // Build family status map — if any member of an evo family is dead/champion/alive,
  // all members in the registry inherit that status (highest priority wins)
  const familyStatusMap={};
  const allForFamily=getAllRegistryPokemon();
  // First pass: collect all statuses per pokemon
  allForFamily.forEach(p=>{
    if(p.status==='never') return;
    familyStatusMap[p.name]=p.status;
  });
  // Second pass: propagate via evolution families we know about
  // We use the evolutions array stored on encounter records
  Object.values(state.games||{}).forEach(gd=>{
    (gd.encounters||[]).forEach(enc=>{
      const family=[norm(enc.species),...(enc.evolutions||[]).map(norm)];
      // Find highest status in family
      let highest='never';
      family.forEach(m=>{
        const s=familyStatusMap[m]||'never';
        if(s==='dead'||(s==='champion'&&highest!=='dead')||(s==='alive'&&highest==='never')) highest=s;
      });
      if(highest!=='never') family.forEach(m=>{
        if(!familyStatusMap[m]||familyStatusMap[m]==='never') familyStatusMap[m]=highest;
      });
    });
  });

  grid.innerHTML=filtered.map(p=>{
    const spriteUrl=getDexSprite(p.name);
    const spr=spriteUrl
      ?`<img class="reg-card-spr" src="${spriteUrl}" alt="${p.name}" loading="lazy"/>`
      :`<div class="reg-card-spr" style="background:var(--surface3);border-radius:6px;"></div>`;
    const dexN=getDexNum(p.name);
    const dexLabel=dexN<9999?`<div style="font-size:8px;color:var(--muted);margin-bottom:2px;">#${String(dexN).padStart(3,'0')}</div>`:'';
    const countBadge=p.catchCount>0?`<span class="reg-card-count">×${p.catchCount}</span>`:'';
    const displayStatus=familyStatusMap[p.name]||p.status;
    const statusLabel=displayStatus==='dead'?'💀 Fallen':displayStatus==='champion'?'🏆 Champion':displayStatus==='alive'?'● Alive':'';
    const unobtainable=!p.obtainable;
    const extraStyle=unobtainable?'filter:grayscale(1);opacity:.35;':''
    return`<div class="reg-card status-${displayStatus}${unobtainable?' status-unobtainable':''}" data-poke="${p.name}" onclick="openRegistryDetail(this.dataset.poke)" style="${extraStyle}">
      ${countBadge}
      ${dexLabel}
      ${spr}
      <div class="reg-card-name">${p.name.replace(/-/g,' ')}</div>
      ${statusLabel?`<div class="reg-card-sub">${statusLabel}</div>`:''}
      ${unobtainable?`<div class="reg-card-sub" style="color:var(--muted);font-size:8px;">not obtainable</div>`:''}
    </div>`;
  }).join('');
}

async function openRegistryDetail(pokeName){
  if(!pokeName){console.error('openRegistryDetail called with no name');return;}
  const k=norm(pokeName);
  document.getElementById('mt').textContent=pokeName.replace(/-/g,' ');
  document.getElementById('mb').innerHTML=`<div style="text-align:center;padding:20px;color:var(--muted);">Loading…</div>`;
  document.getElementById('ma').innerHTML='';
  const cc=document.createElement('button');cc.className='mbtn cancel';cc.textContent='Close';cc.onclick=closeModal;
  document.getElementById('ma').appendChild(cc);
  document.getElementById('modal').classList.add('show');

  try{
    // Fetch data in parallel
    const [pkData, detail, evoChain]=await Promise.all([
      getPokemon(pokeName),
      fetchPokemonDetail(pokeName),
      getEvoChain(pokeName),
    ]);

    // Pre-fetch evo chain sprites
    if(evoChain?.allNames){
      await Promise.allSettled(evoChain.allNames.map(n=>getPokemon(n)));
    }

    const types=(pkData?.types||[]).map(t=>typeChip(t)).join(' ');
    const dexSprUrl=getDexSprite(pokeName);
    const sprite=pkData?.sprite
      ?`<img src="${pkData.sprite}" style="width:80px;height:80px;image-rendering:pixelated;"/>`
      :dexSprUrl?`<img src="${dexSprUrl}" style="width:80px;height:80px;image-rendering:pixelated;"/>`
      :`<div style="width:80px;height:80px;background:var(--surface3);border-radius:10px;"></div>`;
    const stats=detail?.stats||null;
    const statDefs=[{k:'hp',lbl:'HP',col:'#48d848'},{k:'atk',lbl:'ATK',col:'#f08030'},{k:'def',lbl:'DEF',col:'#f8d030'},{k:'spa',lbl:'SPA',col:'#6890f0'},{k:'spd',lbl:'SPD',col:'#78c850'},{k:'spe',lbl:'SPE',col:'#f85888'}];
    const statBars=stats
      ? statDefs.map(({k:sk,lbl,col})=>{
          const v=stats[sk]||0;
          const pct=Math.min(100,Math.round(v/255*100));
          return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
            <span style="font-size:9px;color:var(--muted);width:28px;text-align:right;font-weight:700;">${lbl}</span>
            <div style="flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${col};border-radius:3px;"></div></div>
          <span class="reg-stat-num" style="font-size:10px;font-weight:700;color:${col};width:26px;text-align:right;">${v}</span>
          </div>`;
        }).join('')
      : `<div style="font-size:11px;color:var(--muted);padding:4px 0;">Stats unavailable</div>`;

    // Evolution chain
    let evoHTML='';
    if(evoChain?.allNames?.length>1){
      const evoNodes=evoChain.allNames.map((n,i)=>{
        const ck=norm(n);const cak=NAME_MAP[ck]||ck;
        const ec=pkCache[ck]||pkCache[cak]||{};
        const es=ec.sprite?`<img src="${ec.sprite}" style="width:40px;height:40px;image-rendering:pixelated;"/>`
          :`<div style="width:40px;height:40px;background:var(--surface3);border-radius:5px;"></div>`;
        const isCurrent=ck===k||cak===k;
        const step=evoChain.steps.find(s=>s.to===n);
        const arrow=step?`<div style="text-align:center;margin:0 6px;"><div style="color:var(--muted);font-size:14px;">→</div><div style="font-size:8px;color:var(--gold);font-weight:700;white-space:nowrap;">${step.method}</div></div>`:'';
        return(i>0?arrow:'')+`<div style="text-align:center;opacity:${isCurrent?1:.65};">
          ${es}
          <div style="font-size:9px;font-weight:800;text-transform:capitalize;margin-top:2px;${isCurrent?'color:var(--gold);':'color:var(--muted);'}">${n.replace(/-/g,' ')}</div>
        </div>`;
      });
      evoHTML=`<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
        <div style="font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-bottom:8px;">EVOLUTION CHAIN</div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">${evoNodes.join('')}</div>
      </div>`;
    }

    // Encounter history
    const history=getEncounterHistory(pokeName);
    let histHTML='';
    if(history.length>0){
      const rows=history.map(({gameName,enc})=>{
        const statusCol=enc.status==='dead'?'var(--dead)':enc.status==='champion'?'var(--champion)':'var(--alive)';
        const statusIcon=enc.status==='dead'?'💀':enc.status==='champion'?'🏆':'●';
        return`<div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:5px 0;border-bottom:1px solid var(--border);">
          <div><span style="font-weight:700;">${enc.nickname||enc.species}</span><span style="color:var(--muted);"> · ${gameName}</span></div>
          <div style="display:flex;gap:8px;align-items:center;">
            <span style="color:var(--muted);font-size:10px;">📍 ${enc.route}</span>
            <span style="color:${statusCol};font-weight:700;">${statusIcon} ${enc.status}</span>
          </div>
        </div>`;
      }).join('');
      histHTML=`<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
        <div style="font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-bottom:6px;">ENCOUNTER HISTORY (×${history.length})</div>
        ${rows}
      </div>`;
    }

    // Where to find
    const locations=getRouteLocations(pokeName);
    const locEntries=Object.entries(locations);
    let locHTML='';
    if(locEntries.length>0){
      const isBanned=!!state.bans[k];
      const rows=locEntries.map(([gameId,routes])=>{
        const gm=GAMES.find(g=>g.id===gameId);
        const dim=isBanned?'opacity:.5;text-decoration:line-through;':'';
        return`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;${dim}">
          <div style="font-weight:700;color:var(--text);margin-bottom:2px;">${gm?.n||gameId}</div>
          <div style="color:var(--muted);">${routes.join(' · ')}</div>
        </div>`;
      }).join('');
      locHTML=`<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
        <div style="font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-bottom:6px;">WHERE TO FIND</div>
        ${rows}
      </div>`;
    }

    document.getElementById('mb').innerHTML=`
      <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:12px;">
        ${sprite}
        <div style="flex:1;">${types?`<div style="margin-bottom:8px;">${types}</div>`:''}${statBars}</div>
      </div>
      ${evoHTML}${histHTML}${locHTML}`;

  }catch(err){
    console.error('openRegistryDetail error:',err);
    document.getElementById('mb').innerHTML=`<div style="color:var(--dead);padding:10px;">Error loading data: ${err.message}</div>`;
  }
}

function openRun(gameId){
  currentRun=gameId;openRouteIdx=null;openFloor={};
  const gm=GAMES.find(g=>g.id===gameId);
  const rd=state.games[gameId]||{status:'upcoming',encounters:[]};
  const ro=rd.status==='complete';
  document.getElementById('run-name').textContent=gm.n;
  document.getElementById('run-sub').textContent=gm.g;
  const roEl=document.getElementById('ro-notice');
  if(ro){
    roEl.style.display='block';
    roEl.innerHTML=`📖 Completed run — read only. <button onclick="showRunSummary('${gameId}')" style="margin-left:12px;background:var(--gold2);border:1px solid var(--gold);border-radius:6px;padding:3px 12px;color:white;font-size:11px;font-weight:800;cursor:pointer;font-family:Raleway,sans-serif;">📊 View Run Summary</button>`;
  } else {
    roEl.style.display='none';
    roEl.innerHTML='📖 Completed run — read only.';
  }
  renderRunStats(gameId);
  renderRunLayout(gameId);
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-run').classList.add('active');
}

function openRunPreview(gameId){
  // Open an upcoming game in read-only preview — routes and encounter data visible, no logging
  currentRun=gameId; openRouteIdx=null; openFloor={};
  const gm=GAMES.find(g=>g.id===gameId);
  document.getElementById('run-name').textContent=gm.n;
  document.getElementById('run-sub').textContent=gm.g+' — Preview';
  document.getElementById('ro-notice').style.display='block';
  document.getElementById('ro-notice').textContent='👁 Preview mode — this game hasn\'t started yet. No encounters can be logged.';
  renderRunStats(gameId);
  // Render layout but treat as read-only
  if(!state.games[gameId]) state.games[gameId]={status:'upcoming',encounters:[]};
  const saved=state.games[gameId].status;
  state.games[gameId].status='complete'; // temp flag so layout renders read-only
  renderRunLayout(gameId);
  state.games[gameId].status=saved; // restore
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-run').classList.add('active');
}

function renderStarterSelector(gameId){
  // Yellow uses a different selector — rival battle results instead of starter
  if(gameId==='yellow') return renderYellowRivalSelector(gameId);

  const opts=STARTER_GAMES[gameId];
  if(!opts||opts.length<=1) return ''; // no choice needed
  const chosen=getStarter(gameId);
  const btns=opts.map(s=>{
    const c=pkCache[String(s.id)]||pkCache[s.name];
    if(!c) getPokemon(s.name).then(d=>{ const el=document.getElementById('starter-sel-'+gameId); if(el) el.outerHTML=renderStarterSelector(gameId); });

    return`<button class="starter-btn ${chosen===s.name?'selected':''}" onclick="setStarterChoice('${gameId}','${s.name}')">${spr}<span>${s.name}</span></button>`;

  return`<div class="starter-sel" id="starter-sel-${gameId}">

}

function renderEntryList(gameId, entries, filter){
  const container=document.getElementById('route-list');
  if(!container) return;

  const rd=state.games[gameId]||{encounters:[]};
  const caughtRoutes=new Set((rd.encounters||[]).map(e=>e.route.toLowerCase()));
  const completedEvents=new Set((state.games[gameId]?.completedEvents)||[]);

  // Build familyInRun once — names are pre-normalised via NAME_MAP at parse time
  const familyInRun=new Set();
  (rd.encounters||[]).forEach(e=>{
    const base=norm(e.species);
    familyInRun.add(base);
    familyInRun.add(norm(e.currentSpecies||e.species));
    (e.evolutions||[]).forEach(ev=>{
      const nev=norm(ev);
      if(!isInSameExGroup(base,nev)||base===nev) familyInRun.add(nev);
    });
  });

  const filtered = filter
    ? entries.filter(e => e.kind==='event' || e.label.toLowerCase().includes(filter))
    : entries;

  if(filtered.length===0){
    container.innerHTML='<div class="no-api">No routes match your search.</div>';
    return;
  }

  let routeNum=0;
  container.innerHTML = filtered.map(entry=>{
    if(entry.kind==='event'){
      return renderEventRow(gameId, entry, completedEvents);
    } else {
      routeNum++;
      return renderRouteRow(gameId, entry, routeNum, caughtRoutes, familyInRun);
    }
  }).join('');

  if(openRouteIdx!==null){
    const open=entries.find(e=>e.kind==='route'&&e._origIdx===openRouteIdx);
    if(open) renderRouteBody(gameId, open);
  }
  container._entries=entries;
}

function renderRouteRow(gameId, entry, num, caughtRoutes, familyInRun){
  const isCaught = caughtRoutes.has(entry.label.toLowerCase());
  const isOpen = openRouteIdx===entry._origIdx;
  familyInRun = familyInRun || new Set();

  // "All blocked" = every species is permanently banned
  const allBlocked = !isCaught && entry.pokemon.length>0 && entry.pokemon.every(p=>{
    const nk=norm(p);
    return isBanned(nk)||!!getFamilyBan(nk);
  });

  // "None available" = not banned, not yet caught here, but every species already caught
  // elsewhere in this run (so there's nothing new to catch on this route)
  const noneAvailable = !isCaught && !allBlocked && entry.pokemon.length>0 && entry.pokemon.every(p=>{
    const nk=norm(p);
    const banned=isBanned(nk)||!!getFamilyBan(nk);
    const caughtInRun=familyInRun.has(nk);
    return banned || caughtInRun;
  });

  let statusBadge='';
  let borderStyle='';
  let nameStyle='';
  if(isCaught){
    statusBadge=`<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;background:var(--caught-bg);color:var(--caught-text);border:1px solid var(--caught-border);">✓ Caught</span>`;
    borderStyle='border-left:3px solid var(--green2);';
    nameStyle='color:var(--caught-text);';
  } else if(allBlocked){
    statusBadge=`<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;background:var(--banned-bg);color:var(--banned-text);border:1px solid var(--banned-border);">💀 All Banned</span>`;
    borderStyle='border-left:3px solid var(--banned-border);';
    nameStyle='color:var(--muted);text-decoration:line-through;';
  } else if(noneAvailable){
    statusBadge=`<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;background:#1a1400;color:#a08030;border:1px solid #6a4010;">⚠ None Available</span>`;
    borderStyle='border-left:3px solid #6a4010;';
    nameStyle='color:#a08030;';
  }

  return`<div class="rg" id="rg-${entry._origIdx}">
    <button class="rg-btn ${isOpen?'open':''}" onclick="toggleRoute('${gameId}',${entry._origIdx})" style="${borderStyle}">
      <span class="rg-num">${String(num).padStart(2,'0')}</span>
      <span class="rg-name" style="${nameStyle}">${entry.label}</span>
      <span class="rg-badges">
        ${statusBadge}
        <span style="font-size:10px;color:var(--muted);">${entry.pokemon.length} Pokémon</span>
      </span>
      <span class="rg-chev ${isOpen?'open':''}">▶</span>
    </button>
    <div class="rg-body ${isOpen?'open':''}" id="rb-${entry._origIdx}">
      ${isOpen?'<div class="rload">Loading…</div>':''}
    </div>
  </div>`;
}

// Badge sprite URLs from PokeAPI sprites repo
// Format: https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/badges/{name}.png
const BADGE_BASE='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/badges/';
const BADGE_SPRITES={
  // Kanto
  '1':'boulder-badge','2':'cascade-badge','3':'thunder-badge','4':'rainbow-badge',
  '5':'soul-badge','6':'marsh-badge','7':'volcano-badge','8':'earth-badge',
  'e1':'','e2':'','e3':'','e4':'','c':'',
  // Johto
  // Kanto gym leaders in Gen2 use same badge names
  'k1':'thunder-badge','k2':'marsh-badge','k3':'rainbow-badge','k4':'soul-badge',
  'k5':'cascade-badge','k6':'boulder-badge','k7':'volcano-badge','k8':'earth-badge',
};
// Gen 2 Johto badges
const JOHTO_BADGES={
  '1':'zephyr-badge','2':'hive-badge','3':'plain-badge','4':'fog-badge',
  '5':'storm-badge','6':'mineral-badge','7':'glacier-badge','8':'rising-badge',
};
// Gen 3 Hoenn badges
const HOENN_BADGES={
  '1':'stone-badge','2':'knuckle-badge','3':'dynamo-badge','4':'heat-badge',
  '5':'balance-badge','6':'feather-badge','7':'mind-badge','8':'rain-badge',
};
const HOENN_BADGE_GAMES=new Set(['ruby','sapphire','emerald']);
const JOHTO_BADGE_GAMES=new Set(['gold','silver','crystal']);

function getBadgeSprite(gameId, battleId){
  if(JOHTO_BADGE_GAMES.has(gameId) && JOHTO_BADGES[battleId]) return BADGE_BASE+JOHTO_BADGES[battleId]+'.png';
  if(HOENN_BADGE_GAMES.has(gameId) && HOENN_BADGES[battleId]) return BADGE_BASE+HOENN_BADGES[battleId]+'.png';
  if(BADGE_SPRITES[battleId]) return BADGE_BASE+BADGE_SPRITES[battleId]+'.png';
  return null;
}

function renderLevelCap(gameId){
  const lcContent=document.getElementById('lc-content');
  if(!lcContent) return;
  const badges=state.games[gameId]?.badges??0;
  const order=LEVEL_CAP_ORDER[gameId]||[];
  const maxBadges=order.length-1;
  const teamVisible=state.games[gameId]?.lcTeamVisible||false;

  // Build badge buttons
  const makeBadgeBtn=(b)=>{
    const entry=order[b];
    const battleId=entry?entry[0]:null;
    const sprite=battleId?getBadgeSprite(gameId,battleId):null;
    const earned=b<=badges;
    const earnedCls=earned?'earned':'';
    const title=entry?entry[1]:b+' badges';
    const onclick=`setBadges('${gameId}',${b===badges&&b>0?b-1:b})`;
    let inner;
    if(sprite){
      const filt=earned?'none':'grayscale(1) opacity(.35)';
      inner=`<img src="${sprite}" style="width:22px;height:22px;image-rendering:pixelated;filter:${filt};" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>`
           +`<span style="display:none;font-family:'Press Start 2P',monospace;font-size:7px;">${b}</span>`;
    } else {
      inner=`<span style="font-family:'Press Start 2P',monospace;font-size:7px;">${b}</span>`;
    }
    return `<button class="lc-badge-btn ${earnedCls}" onclick="${onclick}" title="${title}">${inner}</button>`;
  };
  const badgeHTML=`<div class="lc-badge-row">${Array.from({length:maxBadges+1},(_,b)=>makeBadgeBtn(b)).join('')}</div>`;

  const cap=getLevelCap(gameId, badges);
  let capHTML='';
  if(!cap){
    capHTML=`<div class="lc-cap-display"><div class="lc-no-cap">All gyms cleared!</div></div>`;
  } else {
    const teamHTML=cap.battle.team.map(p=>{
      const c=pkCache[norm(p.name)];
      if(!c) getPokemon(p.name).then(()=>renderLevelCap(gameId));
      const spr=c?`<img src="${c.sprite}" alt="${p.name}"/>`:`<div style="width:42px;height:42px;background:var(--surface3);border-radius:6px;margin:0 auto 2px;"></div>`;
      return`<div class="lc-team-poke">${spr}<span class="lc-tp-name">${p.name}</span><span class="lc-tp-lv">Lv ${p.level}</span></div>`;
    }).join('');
    capHTML=`<div class="lc-cap-display">
      <span class="lc-cap-num">Lv ${cap.maxLv}</span>
      <span class="lc-cap-label">${cap.label}</span>
      <button onclick="toggleLcTeam('${gameId}')" style="margin-top:8px;background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 12px;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;font-family:Raleway,sans-serif;width:100%;">${teamVisible?'▲ Hide team':'▼ Show team'}</button>
      <div class="lc-team-row" style="display:${teamVisible?'flex':'none'};margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">${teamHTML}</div>
    </div>`;
  }

  lcContent.innerHTML=badgeHTML+capHTML;
}

function toggleLcTeam(gameId){
  if(!state.games[gameId]) state.games[gameId]={status:'active',encounters:[]};
  state.games[gameId].lcTeamVisible=!(state.games[gameId].lcTeamVisible||false);
  save();
  renderLevelCap(gameId);
}

function togglePartyBox(gameId){
  if(!state.games[gameId]) state.games[gameId]={status:'active',encounters:[]};
  state.games[gameId].partyOpen=!(state.games[gameId].partyOpen!==false);
  save();
  const toggle=document.querySelector('.party-toggle');
  const body=document.querySelector('.party-body');
  const isOpen=state.games[gameId].partyOpen;
  if(toggle){toggle.classList.toggle('open',isOpen);}
  if(body){body.classList.toggle('open',isOpen);}
}

function updatePartyHeader(gameId){
  const encs=state.games[gameId]?.encounters||[];
  const stats=document.querySelector('.pt-stats');
  if(!stats) return;
  const aliveCount=encs.filter(e=>e.status==='alive').length;
  const deadCount=encs.filter(e=>e.status==='dead').length;
  const champCount=encs.filter(e=>e.status==='champion').length;
  stats.innerHTML=`
    <span class="pt-stat" style="color:var(--alive);">● ${aliveCount} Alive</span>
    <span class="pt-stat" style="color:var(--dead);">💀 ${deadCount} Lost</span>
    <span class="pt-stat" style="color:var(--champion);">🏆 ${champCount} Champs</span>`;

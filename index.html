function setBadges(gameId, n){
  if(!state.games[gameId]) state.games[gameId]={status:'active',encounters:[]};
  state.games[gameId].badges=n;
  save();
  renderLevelCap(gameId);
}

function renderEventRow(gameId, entry, completedEvents){
  const style=EVENT_STYLE[entry.type]||{icon:'⚡',bg:'var(--surface2)',border:'var(--border2)',text:'var(--muted)',label:'Event'};
  const done=completedEvents.has(entry._origIdx);
  const ro=(state.games[gameId]||{}).status==='complete';
  const battle=getBattle(gameId, entry.id);
  const filteredTeam=getFilteredTeam(gameId, battle);
  const hasBattle=filteredTeam.length>0;
  const hasConditional=battle?.team.some(p=>p.weakness);
  const isReady=gameId==='yellow'?getYellowEeveelution(gameId)!==null:!!getStarter(gameId);
  const starterWarning=hasConditional&&!isReady
    ?`<div style="font-size:11px;color:#e07080;padding:10px 16px;border-top:1px solid var(--border);">⚠ ${gameId==='yellow'?'Set your rival battle results above':'Select your starter'} to see the correct rival team.</div>`:'';

  const typeColor=TYPE_COLORS_BADGE[battle?.type]||null;
  const typeBadge=typeColor?`<span style="background:${typeColor};color:white;font-size:9px;font-weight:800;padding:2px 9px;border-radius:4px;text-transform:uppercase;">${battle.type}</span>`:'';
  const teamPreviewId=`et-${entry._origIdx}`;

  // For gym leaders, try to show the actual badge sprite instead of the medal emoji
  let rowIcon=`<span style="font-size:16px;flex-shrink:0;">${style.icon}</span>`;
  if(entry.type==='gym-leader' && entry.id){
    const badgeSprite=getBadgeSprite(gameId, entry.id);
    if(badgeSprite){
      rowIcon=`<img src="${badgeSprite}" style="width:28px;height:28px;image-rendering:pixelated;flex-shrink:0;" onerror="this.outerHTML='<span style=\\'font-size:16px;flex-shrink:0;\\'>${style.icon}</span>'"/>`;
    }
  }

  return`<div class="event-row-wrap" id="evw-${entry._origIdx}">
    <div style="background:${style.bg};border:1px solid ${done?'var(--green2)':style.border};border-radius:${hasBattle||starterWarning?`var(--r) var(--r) 0 0`:'var(--r)'};padding:10px 16px;display:flex;align-items:center;gap:10px;">
      ${rowIcon}
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:800;color:${done?'var(--green)':style.text};display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          ${entry.label} ${typeBadge}
        </div>
        <div style="font-size:11px;color:var(--muted);">${style.label}${battle?.name&&battle.name!==entry.label?' · '+battle.name:entry.trainer?' · '+entry.trainer:''}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
        ${hasBattle?`<button class="event-expand-btn" onclick="toggleEventTeam('${gameId}','${entry._origIdx}','${teamPreviewId}')">Team ▾</button>`:''}
        ${!ro?`<button onclick="toggleEventDone('${gameId}',${entry._origIdx})" style="background:${done?'var(--green2)':'transparent'};border:1px solid ${done?'var(--green)':'var(--border2)'};border-radius:6px;padding:4px 12px;color:${done?'white':'var(--muted)'};font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:Raleway,sans-serif;">${done?'✓ Done':'Mark Done'}</button>`
        :`<span style="font-size:11px;color:var(--green);font-weight:700;">${done?'✓ Done':''}</span>`}
      </div>
    </div>
    ${starterWarning}
    ${hasBattle?`<div class="event-team" id="${teamPreviewId}" style="background:var(--bg);border:1px solid ${done?'var(--green2)':style.border};border-top:1px solid var(--border);border-radius:0 0 var(--r) var(--r);">
      <div style="padding:12px 14px;font-size:11px;color:var(--muted);font-style:italic;">Click Team ▾ to load battle details</div>
    </div>`:''}
  </div>`;
}

async function toggleEventTeam(gameId, origIdx, panelId){
  const el=document.getElementById(panelId);
  if(!el) return;
  const isOpen=el.classList.contains('open');
  if(isOpen){ el.classList.remove('open'); return; }
  el.classList.add('open');

  const entries=window._currentEntries||[];
  const entry=entries.find(e=>e._origIdx==origIdx);
  if(!entry) return;
  const battle=getBattle(gameId, entry.id);
  const filteredTeam=getFilteredTeam(gameId, battle);

  el.innerHTML=`<div style="padding:14px 16px;color:var(--muted);font-size:12px;font-style:italic;">Loading team data…</div>`;

  // Fetch all pokemon detail + moves in parallel
  await Promise.allSettled(filteredTeam.map(async p=>{
    await fetchPokemonDetail(p.name);
    await getPokemon(p.name);
    await Promise.allSettled(p.moves.map(m=>fetchMoveData(m)));
  }));

  // Now render rich cards
  const cards=filteredTeam.map(p=>buildPokeBattleCard(p,gameId)).join('');
  el.innerHTML=`<div class="poke-battle-grid">${cards}</div>`;
}

// Games using type-based physical/special split (Gen 1-3)
const GEN_SPLIT_GAMES=new Set(['red','blue','yellow','gold','silver','crystal','ruby','sapphire','emerald','firered','leafgreen']);
// Types that are Special in Gen 1-3
const GEN3_SPECIAL_TYPES=new Set(['fire','water','grass','electric','ice','psychic','dragon','dark']);

function getMoveClass(mv, gameId){
  if(!mv) return 'status';
  if(mv.damage_class==='status') return 'status'; // status is always status
  if(GEN_SPLIT_GAMES.has(gameId)){
    return GEN3_SPECIAL_TYPES.has(mv.type)?'special':'physical';
  }
  return mv.damage_class||'physical'; // Gen 4+ use API value
}

function buildPokeBattleCard(p, gameId){
  const k=norm(p.name);
  const pkData=pkCache[k]||{};
  const detail=detailCache[k]||{};
  const stats=detail.stats||{hp:0,atk:0,def:0,spa:0,spd:0,spe:0};
  const total=detail.total||0;
  const types=pkData.types||[];
  const primaryType=types[0]||'normal';
  const bgColor=TC[primaryType]||'#888';
  const sprite=pkData.sprite||'';

  // Header background gradient from type colour
  const headerBg=`<div class="pbc-header-bg" style="background:${bgColor};"></div>`;

  const typeChips=types.map(t=>typeChip(t)).join('');

  // Moves — 2x2 grid
  // Moves — always 2×2 grid, pad with empty slots
  const movePadded=[...( p.moves||[]).slice(0,4)];
  while(movePadded.length<4) movePadded.push(null);
  const moveCards=movePadded.map(mname=>{
    if(!mname) return`<div class="pbc-move" style="background:transparent;border:1px solid var(--border);opacity:.3;"></div>`;
    const mv=moveCache[norm(mname)]||{};
    const mtype=mv.type||'normal';
    const mbg=TC[mtype]||'#888';
    const mtextCol=TC_DARK.has(mtype)?'#1a1a1a':'white';
    const powerDisplay=mv.power
      ?`<span style="color:${mbg};font-size:10px;font-weight:800;"> ${mv.power}</span>`
      :'';
    const moveTypeChip=`<span style="background:${mbg};color:${mtextCol};font-size:8px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;">${mtype}</span>`;

    // Damage class icon (classic Gen4 style SVGs)
    const dmgClass=getMoveClass(mv,gameId);
    const dmgIcons={
      physical:`<span class="dmg-icon" title="Physical" style="background:#c84820;">
        <svg width="14" height="10" viewBox="0 0 14 10"><circle cx="7" cy="5" r="4" fill="#f8c800" opacity=".9"/><line x1="7" y1="1" x2="7" y2="0" stroke="#f8c800" stroke-width="1.5"/><line x1="7" y1="9" x2="7" y2="10" stroke="#f8c800" stroke-width="1.5"/><line x1="1" y1="5" x2="0" y2="5" stroke="#f8c800" stroke-width="1.5"/><line x1="13" y1="5" x2="14" y2="5" stroke="#f8c800" stroke-width="1.5"/><line x1="2.5" y1="2.5" x2="1.8" y2="1.8" stroke="#f8c800" stroke-width="1.5"/><line x1="11.5" y1="7.5" x2="12.2" y2="8.2" stroke="#f8c800" stroke-width="1.5"/><line x1="11.5" y1="2.5" x2="12.2" y2="1.8" stroke="#f8c800" stroke-width="1.5"/><line x1="2.5" y1="7.5" x2="1.8" y2="8.2" stroke="#f8c800" stroke-width="1.5"/></svg>
      </span>`,
      special:`<span class="dmg-icon" title="Special" style="background:#4858a8;">
        <svg width="14" height="10" viewBox="0 0 14 10"><ellipse cx="7" cy="5" rx="5" ry="3.5" fill="none" stroke="#a0b8f0" stroke-width="1.2"/><ellipse cx="7" cy="5" rx="2.5" ry="1.8" fill="none" stroke="#a0b8f0" stroke-width="1"/><circle cx="7" cy="5" r="1" fill="#a0b8f0"/></svg>
      </span>`,
      status:`<span class="dmg-icon" title="Status" style="background:#788878;">
        <svg width="14" height="10" viewBox="0 0 14 10"><circle cx="7" cy="5" r="3.5" fill="none" stroke="#c8c8a8" stroke-width="1.2"/><path d="M4 5 Q7 2 10 5 Q7 8 4 5Z" fill="#c8c8a8" opacity=".6"/></svg>
      </span>`,
    };
    const dmgBadge=dmgIcons[dmgClass]||dmgIcons.status;

    // Tooltip content
    const ppStr=mv.pp!=null?`PP: ${mv.pp}`:'PP: —';
    const accStr=mv.accuracy!=null?`Acc: ${mv.accuracy}%`:'Acc: —';
    const pwrStr=mv.power!=null?`Pwr: ${mv.power}`:'Pwr: —';
    const effStr=mv.effect||'';
    const genNote=GEN_SPLIT_GAMES.has(gameId)?'<div style="color:#a0a0a0;font-style:italic;margin-top:4px;font-size:8px;">⚠ Stats shown are modern values</div>':'';
    const tooltip=`<div class="move-tooltip">
      <div style="font-weight:800;text-transform:capitalize;margin-bottom:4px;font-size:11px;">${mname.replace(/-/g,' ')}</div>
      <div style="display:flex;gap:8px;margin-bottom:5px;font-size:10px;color:var(--text);">
        <span>${pwrStr}</span><span>${accStr}</span><span>${ppStr}</span>
      </div>
      <div style="display:flex;gap:4px;align-items:center;margin-bottom:5px;">${moveTypeChip}${dmgBadge}</div>
      ${effStr?`<div style="font-size:9px;color:#c8c8c8;line-height:1.4;">${effStr}</div>`:''}
      ${genNote}
    </div>`;

    return`<div class="pbc-move pbc-move-hoverable" onmouseenter="positionMoveTooltip(this)">
      <div class="pbc-move-name" style="display:flex;align-items:center;justify-content:space-between;gap:4px;">
        <span style="text-transform:capitalize;">${mname.replace(/-/g,' ')}</span>
        <span style="display:flex;align-items:center;gap:3px;">${powerDisplay}${dmgBadge}</span>
      </div>
      <div class="pbc-move-sub" style="display:flex;gap:4px;align-items:center;">${moveTypeChip}</div>
      ${tooltip}
    </div>`;
  }).join('');
  const moveGrid=`<div class="pbc-moves">${moveCards}</div>`;

  // Stat bars — max stat ~255, colour by value
  const statDefs=[
    {k:'hp',  lbl:'hp',  col:'#48d848'},
    {k:'atk', lbl:'atk', col:'#f08030'},
    {k:'def', lbl:'def', col:'#f8d030'},
    {k:'spa', lbl:'spa', col:'#6890f0'},
    {k:'spd', lbl:'spd', col:'#78c850'},
    {k:'spe', lbl:'spe', col:'#f85888'},
  ];
  const statBars=statDefs.map(({k:sk,lbl,col})=>{
    const val=stats[sk]||0;
    const pct=Math.min(100,Math.round(val/255*100));
    return`<div class="pbc-stat-row">
      <span class="pbc-stat-lbl">${lbl}</span>
      <div class="pbc-stat-bar"><div class="pbc-stat-fill" style="width:${pct}%;background:${col};"></div></div>
      <span class="pbc-stat-num" style="color:${col};">${val}</span>
    </div>`;
  }).join('');

  return`<div class="poke-battle-card">
    <div class="pbc-header">
      ${headerBg}
      <div class="pbc-header-content">
        <div class="pbc-header-left">
          <div class="pbc-types">${typeChips}</div>
          <div class="pbc-level">Level</div>
          <div class="pbc-name">${p.level} ${p.name}</div>
        </div>
        ${sprite?`<img class="pbc-sprite" src="${sprite}" alt="${p.name}"/>`:''}
      </div>
    </div>
    <div class="pbc-body">
      ${moveGrid}
      <div class="pbc-stats">${statBars}</div>
    </div>
  </div>`;
}

function refreshEventRow(gameId,entry,completedEvents){
  const wrap=document.getElementById('evw-'+entry._origIdx);
  if(wrap) wrap.outerHTML=renderEventRow(gameId,entry,completedEvents);
}

function toggleEventDone(gameId, origIdx){
  if(!state.games[gameId]) state.games[gameId]={status:'active',encounters:[],completedEvents:[]};
  if(!state.games[gameId].completedEvents) state.games[gameId].completedEvents=[];
  const idx=state.games[gameId].completedEvents.indexOf(origIdx);
  const nowDone = idx<0;
  if(idx>=0) state.games[gameId].completedEvents.splice(idx,1);
  else state.games[gameId].completedEvents.push(origIdx);

  // Auto-update badge count when a gym-leader event is marked done/undone
  const entries=window._currentEntries||[];
  const entry=entries.find(e=>e._origIdx===origIdx);
  if(entry&&entry.type==='gym-leader'){
    // Count how many gym-leader events are now marked done
    const completedSet=new Set(state.games[gameId].completedEvents);
    const gymsDone=entries.filter(e=>e.kind==='event'&&e.type==='gym-leader'&&completedSet.has(e._origIdx)).length;
    state.games[gameId].badges=gymsDone;
    renderLevelCap(gameId);
  }

  save();
  const completedEvents=new Set(state.games[gameId].completedEvents||[]);
  const wrap=document.getElementById('evw-'+origIdx);
  if(wrap&&entry) wrap.outerHTML=renderEventRow(gameId,entry,completedEvents);
}

function filterRouteList(gameId){

  const ps=document.getElementById('psearch');if(ps)ps.value='';
  const entries=window._currentEntries||[];
  renderEntryList(gameId, entries, q.toLowerCase().trim());
}

async function filterBySpecies(gameId){
  const q=(document.getElementById('psearch')||{}).value?.trim().toLowerCase();
  const rf=document.getElementById('rsearch');if(rf)rf.value='';
  const entries=window._currentEntries||[];

  if(!q){ renderEntryList(gameId,entries,''); return; }

  // Build family set
  const data=await getPokemon(q);
  if(!data){
    const c=document.getElementById('route-list');
    if(c)c.innerHTML=`<div class="no-api">No Pokémon found for "${q}".</div>`;
    return;
  }
  const evos=await getEvos(data.name);
  const family=new Set(evos.length>0?evos:[data.name]);

  // Filter routes that include any family member
  const matching=entries.filter(e=>{
    if(e.kind!=='route') return false;
    return e.pokemon.some(p=>family.has(norm(p)));
  });

  const container=document.getElementById('route-list');
  if(!container) return;
  if(matching.length===0){
    container.innerHTML=`<div class="no-api">No routes found for <strong>${data.name}</strong> family in this game.</div>`;
    return;
  }
  const rd=state.games[gameId]||{encounters:[]};
  const caughtRoutes=new Set((rd.encounters||[]).map(e=>e.route.toLowerCase()));
  container.innerHTML=`<div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:8px;">${data.name} family found on ${matching.length} route(s)</div>`
    +matching.map((e,i)=>renderRouteRow(gameId,e,i+1,caughtRoutes)).join('');
  if(openRouteIdx!==null){
    const open=matching.find(e=>e._origIdx===openRouteIdx);
    if(open) renderRouteBody(gameId,open);
  }
}

function toggleRoute(gameId, origIdx){
  const entries=window._currentEntries||[];
  const entry=entries.find(e=>e.kind==='route'&&e._origIdx===origIdx);

  const wasOpen=openRouteIdx===origIdx;
  if(openRouteIdx!==null){
    const pb=document.getElementById('rb-'+openRouteIdx);
    const pbt=document.querySelector(`#rg-${openRouteIdx} .rg-btn`);
    const pc=document.querySelector(`#rg-${openRouteIdx} .rg-chev`);
    if(pb){pb.classList.remove('open');pb.innerHTML='';}
    if(pbt)pbt.classList.remove('open');
    if(pc)pc.classList.remove('open');
  }
  if(wasOpen){openRouteIdx=null;return;}
  openRouteIdx=origIdx;
  const body=document.getElementById('rb-'+origIdx);
  const btn=document.querySelector(`#rg-${origIdx} .rg-btn`);
  const chev=document.querySelector(`#rg-${origIdx} .rg-chev`);
  if(!body||!entry)return;
  body.classList.add('open');if(btn)btn.classList.add('open');if(chev)chev.classList.add('open');
  renderRouteBody(gameId, entry);
}

function renderRouteBody(gameId, entry){
  const origIdx=entry._origIdx;
  const body=document.getElementById('rb-'+origIdx);
  if(!body) return;
  const ro=(state.games[gameId]||{}).status==='complete';
  const rd=state.games[gameId]||{encounters:[]};

  // Txt data: no method breakdown — just a flat list
  const pokemon=entry.pokemon;
  if(!pokemon||pokemon.length===0){
    body.innerHTML='<div class="no-enc" style="padding:14px 18px;">No wild encounters for this location.</div>';
    return;
  }

  // Build familyInRun — names pre-normalised so direct norm() lookup works
  const familyInRun = new Set();
  (rd.encounters||[]).forEach(e=>{
    const base=norm(e.species);
    familyInRun.add(base);
    familyInRun.add(norm(e.currentSpecies||e.species));
    (e.evolutions||[]).forEach(ev=>{
      const nev=norm(ev);
      if(!isInSameExGroup(base,nev)||base===nev) familyInRun.add(nev);
    });
  });

  const routeAlreadyCaught = rd.encounters.some(e=>e.route.toLowerCase()===entry.label.toLowerCase());

  const rows=pokemon.map(pname=>{
    const nname=norm(pname);
    const banInfo=getFamilyBan(nname);
    const ban=!!banInfo||(isBanned(nname));
    const bi=banInfo||state.bans[nname]||null;
    // "caught" tag = this species OR any of its family is in the run
    const speciesCaught=familyInRun.has(nname);
    const c=pkCache[nname];
    if(!c){
      if(!window._rbDebounce) window._rbDebounce={};
      if(!window._rbDebounce[origIdx]) window._rbDebounce[origIdx]=debounce(()=>{if(openRouteIdx===origIdx)renderRouteBody(gameId,entry);},80);
      getPokemon(nname).then(window._rbDebounce[origIdx]);
    }
    const spr=c?`<img class="pspr" src="${c.sprite}" alt="${pname}"/>`:`<div class="pspr" style="background:var(--surface3);border-radius:5px;"></div>`;
    const tag=ban?`<span class="ptag b">💀${bi.reason==='dead'?'Dead':'Retired'}</span>`:speciesCaught?'<span class="ptag c">✓ Caught</span>':'';
    // Log button: hidden if route already has an encounter OR species is banned
    const logBtn=(!ro&&!ban&&!routeAlreadyCaught)?`<button class="plog" onclick="quickLog('${gameId}','${encodeURIComponent(entry.label)}','${nname}')">+ Log</button>`:'';
    return`<div class="prow ${ban?'banned':speciesCaught?'caught':''}">${spr}<span class="pname" style="text-transform:capitalize;">${pname}</span>${tag}${logBtn}</div>`;
  }).join('');

  body.innerHTML=`<div class="fcontent">${rows}</div>`;
}

// Pre-compute a ban cache for a given set of pokemon names — avoids O(n²) getFamilyBan calls
function buildBanCache(pokemonNames){
  const cache={};
  pokemonNames.forEach(n=>{
    const k=norm(n);
    cache[k]=getFamilyBan(k);
  });
  return cache;
}

function refreshRouteCaughtBadges(gameId){
  const entries=window._currentEntries||[];
  const q=(document.getElementById('rsearch')||{}).value||'';
  const filter=q.toLowerCase().trim();

  const rd=state.games[gameId]||{encounters:[]};
  const caughtRoutes=new Set((rd.encounters||[]).map(e=>e.route.toLowerCase()));

  // Build familyInRun — names pre-normalised so direct norm() lookup works
  const familyInRun=new Set();
  (rd.encounters||[]).forEach(e=>{
    const base=norm(e.species);
    familyInRun.add(base);
    familyInRun.add(norm(e.currentSpecies||e.species));
    (e.evolutions||[]).forEach(ev=>{
      const nev=norm(ev);
      if(!isInSameExGroup(base,nev)||base===nev) familyInRun.add(nev);
    });
  });

  // Patch only route rows that exist in DOM — no full re-render
  let routeNum=0;
  entries.forEach(entry=>{
    if(entry.kind!=='route') return;
    if(filter&&!entry.label.toLowerCase().includes(filter)) return;
    routeNum++;
    const el=document.getElementById('rg-'+entry._origIdx);
    if(!el) return;
    // Rewrite just the button content
    const isCaught=caughtRoutes.has(entry.label.toLowerCase());
    const allBlocked=!isCaught&&entry.pokemon.length>0&&entry.pokemon.every(p=>{
      const nk=norm(p);
      return isBanned(nk)||!!getFamilyBan(nk);
    });
    const noneAvailable=!isCaught&&!allBlocked&&entry.pokemon.length>0&&entry.pokemon.every(p=>{
      const nk=norm(p);
      const banned=isBanned(nk)||!!getFamilyBan(nk);
      return banned||familyInRun.has(nk);
    });
    let statusBadge='', borderLeft='', nameColor='', nameDecoration='';
    if(isCaught){
      statusBadge=`<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;background:var(--caught-bg);color:var(--caught-text);border:1px solid var(--caught-border);">✓ Caught</span>`;
      borderLeft='3px solid var(--green2)'; nameColor='var(--caught-text)';
    } else if(allBlocked){
      statusBadge=`<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;background:var(--banned-bg);color:var(--banned-text);border:1px solid var(--banned-border);">💀 All Banned</span>`;
      borderLeft='3px solid var(--banned-border)'; nameColor='var(--muted)'; nameDecoration='line-through';
    } else if(noneAvailable){
      statusBadge=`<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;background:#1a1400;color:#a08030;border:1px solid #6a4010;">⚠ None Available</span>`;
      borderLeft='3px solid #6a4010'; nameColor='#a08030';
    }
    const btn=el.querySelector('.rg-btn');
    if(btn){
      btn.style.borderLeft=borderLeft;
      const nameEl=btn.querySelector('.rg-name');
      if(nameEl){ nameEl.style.color=nameColor; nameEl.style.textDecoration=nameDecoration; }
      const badgeEl=btn.querySelector('.rg-badges');
      if(badgeEl){
        const countSpan=`<span style="font-size:10px;color:var(--muted);">${entry.pokemon.length} Pokémon</span>`;
        badgeEl.innerHTML=statusBadge+countSpan;
      }
    }
  });

  // Still re-render the open route body (just the expanded content, not the whole list)
  if(openRouteIdx!==null){
    const open=entries.find(e=>e.kind==='route'&&e._origIdx===openRouteIdx);
    if(open) renderRouteBody(gameId,open);
  }
}

async function refreshOpenRoute(gameId){
  if(openRouteIdx===null) return;
  const entries=window._currentEntries||[];
  const open=entries.find(e=>e.kind==='route'&&e._origIdx===openRouteIdx);
  if(open) renderRouteBody(gameId,open);
}

function quickLog(gameId,encLoc,species){

    </div>`;

  const cf=document.createElement('button');cf.className='mbtn cchamp';cf.textContent='✓ Log It!';
  cf.onclick=async()=>{
    const nick=document.getElementById('ql-nk').value.trim()||species;
    const isShiny=!!(document.getElementById('ql-shiny')?.checked);
    // ONE PER ROUTE check
    const routeNorm=loc.toLowerCase();
    const existing2=state.games[gameId]?.encounters?.find(e=>e.route.toLowerCase()===routeNorm);
    if(existing2){alert(`You already have an encounter on this route!\n(${existing2.nickname} the ${existing2.currentSpecies||existing2.species})\n\nNuzlocke rules: only one Pokémon per route.`);return;}
    const data=await getPokemon(species);if(!data){alert('Could not fetch Pokémon data.');return;}
    const evos=await getEvos(data.name);
    if(!state.games[gameId])state.games[gameId]={status:'active',encounters:[]};
    state.games[gameId].encounters.push({route:loc,species:data.name,currentSpecies:data.name,nickname:nick,status:'alive',evolutions:evos,shiny:isShiny});
    save();closeModal();renderEncs(gameId);renderRunStats(gameId);updateDoneBtn(gameId);
    refreshOpenRoute(gameId);refreshRouteCaughtBadges(gameId);
  };
  ma.appendChild(cc);ma.appendChild(cf);
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('ql-nk')?.focus(),80);
}

async function addEnc(){
  const route=(document.getElementById('fi-route')||{}).value?.trim();
  const pi=(document.getElementById('fi-poke')||{}).value?.trim();
  const nick=(document.getElementById('fi-nick')||{}).value?.trim();
  if(!route||!pi)return alert('Please fill in route and Pokémon.');
  const gameId=currentRun;

  // ONE PER ROUTE check
  const existing=state.games[gameId]?.encounters?.find(e=>e.route.toLowerCase()===route.toLowerCase());
  if(existing)return alert(`You already have an encounter logged for ${route}!\n(${existing.nickname} the ${existing.currentSpecies||existing.species})\n\nNuzlocke rules: only one Pokémon per route.`);

  const data=await getPokemon(pi);
  if(!data)return alert(`Couldn't find: "${pi}"`);
  if(isBanned(data.name)){const b=state.bans[norm(data.name)];return alert(`${data.name} is permanently banned!\nReason: ${b.reason} in ${b.game}`);}
  const evos=await getEvos(data.name);
  if(!state.games[gameId])state.games[gameId]={status:'active',encounters:[]};
  const shiny=!!(document.getElementById('fi-shiny')?.checked);
  state.games[gameId].encounters.push({route,species:data.name,currentSpecies:data.name,nickname:nick||data.name,status:'alive',evolutions:evos,shiny});
  save();
  document.getElementById('fi-route').value='';document.getElementById('fi-poke').value='';document.getElementById('fi-nick').value='';
  const fsEl=document.getElementById('fi-shiny');if(fsEl)fsEl.checked=false;
  const bw=document.getElementById('ban-warn');if(bw)bw.classList.remove('show');
  renderEncs(gameId);renderRunStats(gameId);updateDoneBtn(gameId);
  refreshRouteCaughtBadges(gameId);
}

async function checkBan(){
  const val=(document.getElementById('fi-poke')||{}).value?.trim();
  const bw=document.getElementById('ban-warn');if(!bw)return;
  if(!val){bw.classList.remove('show');return;}
  const data=await getPokemon(val);
  if(data&&isBanned(data.name)){const b=state.bans[norm(data.name)];bw.textContent=`⚠ ${data.name} is banned — ${b.reason} in ${b.game}.`;bw.classList.add('show');}
  else bw.classList.remove('show');
}

// Debounce helper — collapses rapid repeated calls into one
function debounce(fn, ms){
  let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); };
}
const renderEncsDebounced={};

function renderEncs(gameId){
  const rd=state.games[gameId]||{encounters:[]};
  const encs=rd.encounters||[];
  const ro=rd.status==='complete';
  const list=document.getElementById('enc-list');if(!list)return;
  updatePartyHeader(gameId);
  if(encs.length===0){list.innerHTML='<div class="empty-st"><p>No encounters yet.</p></div>';return;}

  // Pre-fetch all missing sprites in one batch — then do a single re-render when all arrive
  const missing=encs.filter(enc=>!(pkCache[norm(enc.currentSpecies||enc.species)]||pkCache[norm(enc.species)])?.sprite);
  if(missing.length>0){
    if(!renderEncsDebounced[gameId])
      renderEncsDebounced[gameId]=debounce(()=>renderEncs(gameId), 80);
    missing.forEach(enc=>{
      const sp=enc.currentSpecies||enc.species;
      getPokemon(sp).then(()=>renderEncsDebounced[gameId]());
    });
  }

  list.innerHTML=encs.map((enc,idx)=>{
    const spKey=norm(enc.currentSpecies||enc.species);
    const c=pkCache[spKey]||pkCache[norm(enc.species)]||{};
    const spr=c.sprite?`<img class="ec-spr" src="${c.sprite}" id="ec-spr-${idx}" alt="${enc.species}"/>`:`<div class="ec-spr" id="ec-spr-${idx}"></div>`;
    const types=(c.types||[]).map(t=>typeChip(t)).join(' ');
    const statusBtns=['alive','dead','champion'];
    const btns=ro?'':statusBtns.map(s=>`<button class="sb-ec ${s} ${enc.status===s?'active':''}" onclick="setStatus('${gameId}',${idx},'${s}')">${s}</button>`).join('');
    const evoOpts=(enc.evolutions||[]).filter(e=>e!==enc.species).map(e=>`<option value="${e}" ${enc.currentSpecies===e?'selected':''}>${e}</option>`).join('');
    const evoRow=!ro&&evoOpts?`<div class="evo-row"><label>Evolved:</label><select class="evo-sel" onchange="setEvo('${gameId}',${idx},this.value)"><option value="${enc.species}" ${!enc.currentSpecies||enc.currentSpecies===enc.species?'selected':''}>${enc.species}</option>${evoOpts}</select></div>`:'';
    const del=ro?'':`<button class="ec-del" onclick="delEnc('${gameId}',${idx})" title="Remove">✕</button>`;
    const dispSp=enc.currentSpecies||enc.species;
    return`<div class="ec ${enc.status}">
      <div class="ec-top">${spr}<div class="ec-meta">
        <div class="ec-nick">${enc.nickname||enc.species}${enc.shiny?' <span title="Shiny!" style="font-size:13px;">✨</span>':''}</div>
        <div class="ec-sp">${dispSp}${dispSp!==enc.species?` (was ${enc.species})`:''}</div>
        <div class="ec-rt">📍 ${enc.route}</div>
        <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;">${types}</div>
      </div>${del}</div>
      <div class="ec-btns">${btns}</div>${evoRow}
    </div>`;
  }).join('');
}

function renderRunStats(gameId){
  const encs=(state.games[gameId]||{}).encounters||[];
  document.getElementById('run-stats').innerHTML=[
    {l:'Alive',v:encs.filter(e=>e.status==='alive').length,c:'var(--alive)'},
    {l:'Lost',v:encs.filter(e=>e.status==='dead').length,c:'var(--dead)'},
    {l:'Champs',v:encs.filter(e=>e.status==='champion').length,c:'var(--champion)'},

function updateDoneBtn(gameId){
  const w=document.getElementById('done-wrap');if(!w)return;
  const rd=state.games[gameId];
  w.innerHTML=(rd&&rd.encounters.length>0&&rd.status!=='complete')
    ?`<button class="done-btn" onclick="confirmDone('${gameId}')">🏆 Complete Run &amp; Advance</button>`:'';
}

function setStatus(gameId,idx,ns){
  const enc=state.games[gameId].encounters[idx];
  if(enc.status===ns)return;
  // Reverting dead/champion back to alive: just clear without modal
  if(ns==='alive'&&(enc.status==='dead'||enc.status==='champion')){
    // Remove from bans too
    const sp=norm(enc.currentSpecies||enc.species);
    delete state.bans[sp];
    delete enc.causeOfDeath;
    enc.status='alive';
    _familyBanCache={};
    save();renderEncs(gameId);renderRunStats(gameId);updateBanBadge();
    refreshRouteCaughtBadges(gameId);
    return;
  }
  if(ns==='dead'||ns==='champion')showConfirmModal(gameId,idx,ns);
  else{enc.status=ns;save();renderEncs(gameId);renderRunStats(gameId);}
}

function showConfirmModal(gameId,idx,ns){

        <option value="Status condition">Status condition (poison/burn/etc)</option>
        <option value="Critical hit">Critical hit</option>
        <option value="Other">Other</option>
      </select>
      <input id="cod-detail" class="fi" placeholder="Who/what killed them? (e.g. Brock's Onix)" style="width:100%;"/>
    </div>`:''}
    <p style="margin-top:12px;color:${dead?'#e07080':'var(--gold)'};font-weight:700;font-size:12px;">This cannot be undone.</p>`;
  const ma=document.getElementById('ma');ma.innerHTML='';
  const cc=document.createElement('button');cc.className='mbtn cancel';cc.textContent='Cancel';cc.onclick=closeModal;

    enc.status=ns;

      const causeType=(document.getElementById('cod-type')||{}).value||'';
      const causeDetail=(document.getElementById('cod-detail')||{}).value?.trim()||'';
      if(causeType||causeDetail) enc.causeOfDeath={type:causeType,detail:causeDetail};
    }
    doBan(sp,dead?'dead':'champion',gm.n,enc.nickname);
    save();closeModal();renderEncs(gameId);renderRunStats(gameId);updateBanBadge();
    refreshOpenRoute(gameId);
    refreshRouteCaughtBadges(gameId);
  };
  ma.appendChild(cc);ma.appendChild(cf);
  document.getElementById('modal').classList.add('show');
  if(dead) setTimeout(()=>document.getElementById('cod-detail')?.focus(),100);
}

function delEnc(gameId,idx){
  if(!confirm('Remove this encounter?'))return;
  state.games[gameId].encounters.splice(idx,1);
  save();renderEncs(gameId);renderRunStats(gameId);refreshRouteCaughtBadges(gameId);

async function setEvo(gameId,idx,sp){
  const enc=state.games[gameId].encounters[idx];

function confirmDone(gameId){
  const gm=GAMES.find(g=>g.id===gameId);

function renderBanList(){
  const grid=document.getElementById('ban-grid');
  const bans=Object.entries(state.bans);
  updateBanBadge();
  if(bans.length===0){grid.innerHTML='<div class="empty-st" style="grid-column:1/-1"><p>No bans yet!<br>Your legacy is unscarred.</p></div>';return;}

  const champions=bans.filter(([,d])=>d.reason==='champion');
  const dead=bans.filter(([,d])=>d.reason==='dead');

  function makeBanCards(list){
    return list.map(([sp,d])=>{
      const c=pkCache[sp];const spr=c?`<img src="${c.sprite}" alt="${sp}"/>`:`<div style="width:60px;height:60px;margin:0 auto 5px;background:var(--surface3);border-radius:7px;"></div>`;
      if(!c)getPokemon(sp).then(()=>renderBanList());
      // Look up causeOfDeath from game data
      let deathNote='';
      if(d.reason==='dead'){
        for(const [gid,gdata] of Object.entries(state.games||{})){
          const enc=(gdata.encounters||[]).find(e=>norm(e.currentSpecies||e.species)===norm(sp)||norm(e.species)===norm(sp));
          if(enc?.causeOfDeath){
            const cod=enc.causeOfDeath;
            deathNote=`<div style="font-size:9px;color:#e07080;margin-top:4px;font-style:italic;">${cod.type?cod.type:''}${cod.detail?' — '+cod.detail:''}</div>`;
            break;
          }
        }
      }
      return`<div class="ban-card ${d.reason==='dead'?'db':'cb'}">${spr}<div class="ban-sp">${sp}</div><div class="ban-rs ${d.reason}">${d.reason==='dead'?'💀 Died':'🏆 Retired'}</div><div style="font-size:10px;color:var(--muted);margin-top:3px;">${d.nickname} · ${d.game}</div>${deathNote}</div>`;
    }).join('');
  }

  grid.innerHTML=`
    ${champions.length>0?`
      <div style="grid-column:1/-1;margin-bottom:4px;">
        <div class="sec" style="margin-bottom:12px;">🏆 CHAMPIONS — RETIRED (${champions.length})</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;margin-bottom:24px;">
          ${makeBanCards(champions)}
        </div>
      </div>`:''}
    ${dead.length>0?`
      <div style="grid-column:1/-1;">
        <div class="sec" style="margin-bottom:12px;">💀 FALLEN — DIED IN BATTLE (${dead.length})</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;">
          ${makeBanCards(dead)}
        </div>
      </div>`:''}`;
}

function updateBanBadge(){const c=Object.keys(state.bans).length;document.getElementById('ban-badge').textContent=c>0?`(${c})`:'';  }

function saveToSlot(i){
  const slots=getSaveSlots();
  while(slots.length<=i)slots.push(null);
  const snap=JSON.parse(JSON.stringify(state));
  snap._savedAt=new Date().toLocaleDateString();
  slots[i]=snap;
  setSaveSlots(slots);
  openSaveModal();
}

function loadFromSlot(i){
  const slots=getSaveSlots();
  const slot=slots[i];if(!slot)return;
  if(!confirm(`Load Slot ${i+1}? Your current unsaved progress will be replaced.`))return;
  state=JSON.parse(JSON.stringify(slot));
  clearAllCaches();
  save();
  closeModal();
  showView('dashboard');
}

function deleteSlot(i){
  if(!confirm(`Delete Slot ${i+1}?`))return;
  const slots=getSaveSlots();slots[i]=null;setSaveSlots(slots);openSaveModal();
}

function exportSave(){
  const snap=JSON.parse(JSON.stringify(state));
  snap._exportedAt=new Date().toISOString();
  const blob=new Blob([JSON.stringify(snap,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`nuzlocke-save-${new Date().toISOString().slice(0,10)}.json`;a.click();
}

function importSave(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(!imported.games||!imported.bans)throw new Error('Invalid save file');
      if(!confirm('Import this save? Your current data will be replaced.'))return;
      state=imported;clearAllCaches();save();closeModal();showView('dashboard');
    }catch(err){alert('Invalid save file: '+err.message);}
  };
  reader.readAsText(file);
}

// Position move tooltip below the hovered card using fixed coordinates
function positionMoveTooltip(el){
  const tip=el.querySelector('.move-tooltip');

  const rect=el.getBoundingClientRect();

  let left=rect.left+(rect.width/2)-(tipW/2);

function getGHConfig(){

}
function setGHConfig(cfg){
  try{localStorage.setItem(GH_CONFIG_KEY,JSON.stringify(cfg));}catch(e){}

function updateGHNavStatus(status, text){
  const btn=document.getElementById('gh-nav-btn');
  const badge=document.getElementById('gh-nav-status');
  if(!btn||!badge) return;
  badge.className='gh-status '+status;
  badge.textContent=text;
  btn.classList.toggle('connected', status==='ok');

// Build GitHub API URL for the save file
function ghSaveUrl(cfg){
  return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path||'save.json'}`;
}

async function ghGetFile(cfg){
  const r=await fetch(ghSaveUrl(cfg),{
    headers:{'Authorization':'token '+cfg.token,'Accept':'application/vnd.github.v3+json'}
  });
  if(r.status===404) return null; // file doesn't exist yet
  if(!r.ok) throw new Error(`GitHub API error ${r.status}`);
  const d=await r.json();
  return {content:JSON.parse(atob(d.content.replace(/\n/g,''))), sha:d.sha};
}

async function ghPutFile(cfg, content, sha){
  const body={
    message: 'Nuzlocke save '+new Date().toISOString().slice(0,16),
    content: btoa(unescape(encodeURIComponent(JSON.stringify(content)))),
  };
  if(sha) body.sha=sha; // required for updates, omit for first create
  const r=await fetch(ghSaveUrl(cfg),{
    method:'PUT',
    headers:{
      'Authorization':'token '+cfg.token,
      'Accept':'application/vnd.github.v3+json',
      'Content-Type':'application/json',
    },
    body:JSON.stringify(body),
  });
  if(!r.ok){
    const err=await r.json();
    throw new Error(err.message||`GitHub API error ${r.status}`);
  }
  return await r.json();
}

async function ghPush(){
  const cfg=getGHConfig();
  if(!cfg) return;
  updateGHNavStatus('syncing','↑');
  try{
    // Get current SHA so we can update the file
    const existing=await ghGetFile(cfg);
    const snap=JSON.parse(JSON.stringify(state));
    snap._syncedAt=new Date().toISOString();
    await ghPutFile(cfg, snap, existing?.sha);
    updateGHNavStatus('ok','✓ Synced');
  }catch(e){
    console.error('GitHub push failed:',e);
    updateGHNavStatus('err','✕ Error');
  }
}

async function ghPull(){
  const cfg=getGHConfig();
  if(!cfg) return null;
  updateGHNavStatus('syncing','↓');
  try{
    const result=await ghGetFile(cfg);
    if(!result){updateGHNavStatus('ok','No save yet');return null;}
    updateGHNavStatus('ok','✓ Synced');
    return result.content;
  }catch(e){
    console.error('GitHub pull failed:',e);
    updateGHNavStatus('err','✕ Error');
    return null;
  }
}

// Override save() to also push to GitHub (debounced)
let _ghPushTimer=null;
const _originalSave=save;
function save(){
  _ls.setItem(SAVE_KEY,JSON.stringify(state));
  // Debounce GitHub push — wait 2s after last save before pushing
  if(getGHConfig()){
    clearTimeout(_ghPushTimer);
    _ghPushTimer=setTimeout(ghPush, 2000);
  }
}

async function openGitHubModal(){
  const cfg=getGHConfig()||{owner:'',repo:'',token:'',path:'save.json'};
  document.getElementById('mt').textContent='☁️ GitHub Cloud Sync';
  document.getElementById('mb').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:12px;">
      <p style="font-size:12px;color:var(--muted);line-height:1.6;">
        Connect to a GitHub repo to sync your save data across devices. Your save is stored as <code>save.json</code> in your repo — it updates automatically as you play.
      </p>
      <div class="fg">
        <label>GITHUB USERNAME</label>
        <input class="fi" id="gh-owner" value="${cfg.owner}" placeholder="your-username"/>
      </div>
      <div class="fg">
        <label>REPOSITORY NAME</label>
        <input class="fi" id="gh-repo" value="${cfg.repo}" placeholder="nuzlocke-tracker"/>
      </div>
      <div class="fg">
        <label>PERSONAL ACCESS TOKEN</label>
        <input class="fi" id="gh-token" type="password" value="${cfg.token}" placeholder="ghp_xxxxxxxxxxxx"/>
        <span style="font-size:10px;color:var(--muted);margin-top:3px;">GitHub → Settings → Developer Settings → Personal Access Tokens (Classic) → repo scope</span>
      </div>
      <div class="fg" style="margin-bottom:0;">
        <label>SAVE FILE PATH (default: save.json)</label>
        <input class="fi" id="gh-path" value="${cfg.path||'save.json'}" placeholder="save.json"/>
      </div>
      <div id="gh-modal-status" style="font-size:11px;padding:8px 10px;border-radius:6px;display:none;"></div>
    </div>`;

  const ma=document.getElementById('ma');ma.innerHTML='';
  const cancel=document.createElement('button');cancel.className='mbtn cancel';cancel.textContent='Cancel';cancel.onclick=closeModal;
  const saveBtn=document.createElement('button');saveBtn.className='mbtn cchamp';saveBtn.textContent='Save & Test Connection';
  saveBtn.onclick=async()=>{
    const newCfg={
      owner:document.getElementById('gh-owner').value.trim(),
      repo:document.getElementById('gh-repo').value.trim(),
      token:document.getElementById('gh-token').value.trim(),
      path:document.getElementById('gh-path').value.trim()||'save.json',
    };
    if(!newCfg.owner||!newCfg.repo||!newCfg.token){
      alert('Please fill in all fields.');return;
    }
    const st=document.getElementById('gh-modal-status');
    st.style.display='block';st.style.background='var(--surface3)';st.style.color='var(--gold)';
    st.textContent='Testing connection…';saveBtn.disabled=true;

    try{
      setGHConfig(newCfg);
      // Test by trying to get the file (or 404 is fine — means repo exists but no save yet)
      await ghGetFile(newCfg);
      st.style.background='var(--caught-bg)';st.style.color='var(--caught-text)';
      st.textContent='✓ Connected! Checking for existing save…';
      // Check if there's a remote save to pull
      const remote=await ghPull();
      if(remote&&remote.games){
        saveBtn.textContent='✓ Connected';
        const localEncs=Object.values(state.games||{}).reduce((s,g)=>s+(g.encounters||[]).length,0);
        const remoteEncs=Object.values(remote.games||{}).reduce((s,g)=>s+(g.encounters||[]).length,0);
        if(remoteEncs>0){
          st.textContent=`✓ Found remote save (${remoteEncs} encounters). Use "Pull from GitHub" to load it, or "Push to GitHub" to overwrite with local data.`;
          // Add pull/push buttons
          const pullBtn=document.createElement('button');pullBtn.className='mbtn';pullBtn.textContent=`⬇ Pull from GitHub (${remoteEncs} enc)`;
          pullBtn.style.cssText='background:var(--blue2);border-color:var(--blue);color:white;margin-top:8px;';
          pullBtn.onclick=async()=>{
            if(!confirm('Load save from GitHub? Your local data will be replaced.'))return;
            state=remote;clearAllCaches();_ls.setItem(SAVE_KEY,JSON.stringify(state));
            closeModal();showView('dashboard');
          };
          const pushBtn=document.createElement('button');pushBtn.className='mbtn';pushBtn.textContent=`↑ Push local to GitHub (${localEncs} enc)`;
          pushBtn.style.cssText='background:var(--surface3);border-color:var(--border2);color:var(--text);margin-top:8px;';
          pushBtn.onclick=async()=>{
            if(!confirm('Overwrite GitHub save with local data?'))return;
            await ghPush();closeModal();
          };
          ma.insertBefore(pushBtn,cancel);
          ma.insertBefore(pullBtn,cancel);
        } else {
          st.textContent='✓ Connected! No remote save yet — your data will sync automatically as you play.';
          await ghPush(); // push current state immediately
        }
      } else {
        st.textContent='✓ Connected! Your data will sync automatically as you play.';
        await ghPush();
      }
      updateGHNavStatus('ok','✓ Synced');
    }catch(e){
      st.style.background='var(--banned-bg)';st.style.color='var(--banned-text)';
      st.textContent='✕ Error: '+e.message+'. Check your username, repo name, and token.';
      updateGHNavStatus('err','✕ Error');
    }
    saveBtn.disabled=false;
  };

  // If already connected, show disconnect option
  if(cfg.token){
    const disconnectBtn=document.createElement('button');disconnectBtn.className='mbtn';
    disconnectBtn.textContent='Disconnect GitHub';
    disconnectBtn.style.cssText='background:var(--banned-bg);border-color:var(--banned-border);color:var(--banned-text);';
    disconnectBtn.onclick=()=>{
      if(!confirm('Disconnect GitHub sync? Your local save data is kept.'))return;
      localStorage.removeItem(GH_CONFIG_KEY);
      updateGHNavStatus('','');
      closeModal();
    };
    ma.appendChild(disconnectBtn);
  }
  ma.appendChild(cancel);
  ma.appendChild(saveBtn);
  document.getElementById('modal').classList.add('show');
}

async function initGitHubSync(){
  const cfg=getGHConfig();
  if(!cfg||!cfg.token) return;
  // On load, pull from GitHub and use whichever save is newer
  try{
    const remote=await ghGetFile(cfg);
    if(!remote) {updateGHNavStatus('ok','✓ Connected');return;}
    const remoteState=remote.content;
    const localTime=state._syncedAt||state._exportedAt||'';
    const remoteTime=remoteState._syncedAt||remoteState._exportedAt||'';
    // Use remote if it's newer or local has no timestamp
    if(!localTime||(remoteTime&&remoteTime>localTime)){
      const remoteEncs=Object.values(remoteState.games||{}).reduce((s,g)=>s+(g.encounters||[]).length,0);
      const localEncs=Object.values(state.games||{}).reduce((s,g)=>s+(g.encounters||[]).length,0);
      if(remoteEncs>=localEncs){
        state=remoteState;
        clearAllCaches();
        _ls.setItem(SAVE_KEY,JSON.stringify(state));
        renderDash();
      }
    }
    updateGHNavStatus('ok','✓ Synced');
  }catch(e){
    console.error('GitHub init sync failed:',e);
    updateGHNavStatus('err','✕ Offline');
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
initTheme();
ensureGame();
renderDash();
initGitHubSync();
</script>
</body>
